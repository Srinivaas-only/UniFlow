<![CDATA[<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>UniFlow | Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../theme.css" rel="stylesheet"/>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111a; }
</style>
</head>
<body>

<!-- Full-screen backdrop overlay -->
<div class="fixed inset-0 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">

    <!-- Sign Up Modal Card -->
    <div class="w-full max-w-[400px] rounded-2xl p-8" style="background: #1a1825;">

        <!-- App Title -->
        <div class="text-center mb-8">
            <h1 class="text-[26px] font-bold" style="color: #f1eff5;">UniFlow</h1>
            <p class="text-sm mt-1" style="color: #948f99;">Create your account</p>
        </div>

        <!-- Email Input -->
        <div class="mb-4">
            <label for="signup-email" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">Email</label>
            <input
                type="email"
                id="signup-email"
                name="email"
                placeholder="Enter your email"
                autocomplete="email"
                class="w-full px-4 py-3 rounded-lg text-sm outline-none focus:ring-2"
                style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
            />
        </div>

        <!-- Password Input with Show/Hide -->
        <div class="mb-4">
            <label for="signup-password" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">Password</label>
            <div class="relative">
                <input
                    type="password"
                    id="signup-password"
                    name="password"
                    placeholder="Create a password"
                    autocomplete="new-password"
                    class="w-full px-4 py-3 pr-16 rounded-lg text-sm outline-none focus:ring-2"
                    style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
                />
                <button
                    type="button"
                    id="toggle-password"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold bg-transparent border-none cursor-pointer"
                    style="color: #3b82f6;"
                >Show</button>
            </div>
        </div>

        <!-- Display Name Input -->
        <div class="mb-6">
            <label for="signup-name" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">What should we call you?</label>
            <input
                type="text"
                id="signup-name"
                name="name"
                placeholder="Enter a display name"
                autocomplete="nickname"
                class="w-full px-4 py-3 rounded-lg text-sm outline-none focus:ring-2"
                style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
            />
        </div>

        <!-- Sign Up Button (disabled until all fields are filled) -->
        <button
            type="button"
            id="signup-btn"
            disabled
            class="w-full py-3 rounded-lg text-sm font-bold border-none cursor-not-allowed transition-opacity"
            style="background: #3b82f6; color: #ffffff; opacity: 0.4;"
        >Sign Up</button>

        <!-- Footer Link -->
        <p class="text-center text-xs mt-6" style="color: #948f99;">
            Already have an account? <a href="./login.html" class="font-semibold hover:underline" style="color: #3b82f6;">Log in</a>
        </p>

    </div>
</div>

<script>
(function() {
    var emailInput = document.getElementById('signup-email');
    var passwordInput = document.getElementById('signup-password');
    var nameInput = document.getElementById('signup-name');
    var toggleBtn = document.getElementById('toggle-password');
    var signupBtn = document.getElementById('signup-btn');

    // Validate all fields and toggle button state
    function validateFields() {
        var allFilled = emailInput.value.trim() !== '' &&
                        passwordInput.value.trim() !== '' &&
                        nameInput.value.trim() !== '';
        signupBtn.disabled = !allFilled;
        if (allFilled) {
            signupBtn.style.opacity = '1';
            signupBtn.style.cursor = 'pointer';
            signupBtn.classList.remove('cursor-not-allowed');
            signupBtn.classList.add('hover:opacity-90');
        } else {
            signupBtn.style.opacity = '0.4';
            signupBtn.style.cursor = 'not-allowed';
            signupBtn.classList.add('cursor-not-allowed');
            signupBtn.classList.remove('hover:opacity-90');
        }
    }

    // Listen for input changes on all fields
    emailInput.addEventListener('input', validateFields);
    passwordInput.addEventListener('input', validateFields);
    nameInput.addEventListener('input', validateFields);

    // Password show/hide toggle
    toggleBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    });

    // Enter key triggers Sign Up button click (only if not disabled)
    function onEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!signupBtn.disabled) {
                signupBtn.click();
            }
        }
    }

    emailInput.addEventListener('keydown', onEnter);
    passwordInput.addEventListener('keydown', onEnter);
    nameInput.addEventListener('keydown', onEnter);

    // Sign Up button handler — redirect to 01.html
    signupBtn.addEventListener('click', function() {
        if (signupBtn.disabled) return;
        console.log('Sign Up clicked', {
            email: emailInput.value,
            password: passwordInput.value,
            name: nameInput.value
        });
        window.location.href = './01.html';
    });
})();
</script>
</body>
</html>
]]>

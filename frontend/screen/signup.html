<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>UniFlow | Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../theme.css" rel="stylesheet"/>
<style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#12111A; }
    .bg-glow-violet { background:radial-gradient(ellipse 80% 60% at 30% 20%,rgba(214,196,255,0.18) 0%,transparent 65%); }
    .bg-glow-rose { background:radial-gradient(ellipse 70% 50% at 75% 80%,rgba(255,194,220,0.10) 0%,transparent 60%); }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation:fadeInUp 0.5s ease-out forwards; opacity:0; }
    @keyframes pulse-glow { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:0.85;transform:scale(1.04)} }
    .ai-pulse { animation:pulse-glow 4s infinite ease-in-out; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .signup-field:focus { border-color: #D6C4FF; box-shadow: 0 0 0 2px rgba(214,196,255,0.15); }
    .signup-field::placeholder { color: #948f99; }
</style>
</head>
<body class="bg-background text-on-surface">

<!-- Background Glows (matches landing page) -->
<div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-glow-violet ai-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[65%] h-[65%] bg-glow-rose"></div>
</div>

<!-- Full-screen centered card -->
<div class="fixed inset-0 flex items-center justify-center p-4">

    <!-- Sign Up Card -->
    <div class="w-full max-w-[420px] bg-surface-container/60 backdrop-blur-2xl rounded-3xl p-8 border border-outline-variant/10 shadow-2xl fade-in-up">

        <!-- Logo + Title -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-primary text-3xl">auto_awesome</span>
            </div>
            <h1 class="text-headline-lg font-bold text-on-surface">Join UniFlow</h1>
            <p class="text-on-surface-variant text-label-sm mt-1">Create your account to get started</p>
        </div>

        <!-- Error message (hidden by default) -->
        <div id="signup-error" class="hidden mb-4 p-3 rounded-2xl text-label-sm text-center bg-rose-500/15 text-rose-400"></div>

        <!-- Email -->
        <div class="mb-4">
            <label for="signup-email" class="text-label-sm text-on-surface-variant block mb-1.5">Email</label>
            <input
                type="email"
                id="signup-email"
                name="email"
                placeholder="you@university.edu"
                autocomplete="email"
                class="signup-field w-full bg-surface-container-high rounded-2xl px-4 py-3 text-on-surface border border-outline-variant/30 outline-none transition-all"
            />
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label for="signup-password" class="text-label-sm text-on-surface-variant block mb-1.5">Password</label>
            <div class="relative">
                <input
                    type="password"
                    id="signup-password"
                    name="password"
                    placeholder="Min 6 characters"
                    autocomplete="new-password"
                    class="signup-field w-full bg-surface-container-high rounded-2xl px-4 py-3 pr-16 text-on-surface border border-outline-variant/30 outline-none transition-all"
                />
                <button
                    type="button"
                    id="toggle-password"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold bg-transparent border-none cursor-pointer text-primary"
                >Show</button>
            </div>
        </div>

        <!-- Display Name -->
        <div class="mb-6">
            <label for="signup-name" class="text-label-sm text-on-surface-variant block mb-1.5">Display Name</label>
            <input
                type="text"
                id="signup-name"
                name="name"
                placeholder="What should we call you?"
                autocomplete="nickname"
                class="signup-field w-full bg-surface-container-high rounded-2xl px-4 py-3 text-on-surface border border-outline-variant/30 outline-none transition-all"
            />
        </div>

        <!-- Sign Up Button -->
        <button
            type="button"
            id="signup-btn"
            disabled
            class="w-full py-3.5 bg-primary text-on-primary rounded-2xl font-bold text-body-md border-none cursor-not-allowed transition-all opacity-40 hover:brightness-110 active:scale-[0.97] flex items-center justify-center gap-2"
        >
            <span class="material-symbols-outlined">person_add</span> Create Account
        </button>

        <!-- Footer -->
        <p class="text-center text-label-sm text-on-surface-variant mt-6">
            Already have an account? <a href="./login.html" class="text-primary font-bold hover:underline">Log in</a>
        </p>

    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>

<script>
(function() {
    var emailInput = document.getElementById('signup-email');
    var passwordInput = document.getElementById('signup-password');
    var nameInput = document.getElementById('signup-name');
    var toggleBtn = document.getElementById('toggle-password');
    var signupBtn = document.getElementById('signup-btn');
    var errorBox = document.getElementById('signup-error');

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        errorBox.classList.add('shake');
        setTimeout(function() { errorBox.classList.remove('shake'); }, 400);
    }

    function hideError() {
        errorBox.classList.add('hidden');
    }

    function validateFields() {
        var allFilled = emailInput.value.trim() !== '' &&
                        passwordInput.value.trim() !== '' &&
                        nameInput.value.trim() !== '';
        signupBtn.disabled = !allFilled;
        if (allFilled) {
            signupBtn.style.opacity = '1';
            signupBtn.style.cursor = 'pointer';
            signupBtn.classList.remove('cursor-not-allowed');
        } else {
            signupBtn.style.opacity = '0.4';
            signupBtn.style.cursor = 'not-allowed';
            signupBtn.classList.add('cursor-not-allowed');
        }
    }

    emailInput.addEventListener('input', validateFields);
    passwordInput.addEventListener('input', validateFields);
    nameInput.addEventListener('input', validateFields);

    toggleBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    });

    function onEnter(e) {
        if (e.key === 'Enter') { e.preventDefault(); if (!signupBtn.disabled) signupBtn.click(); }
    }
    emailInput.addEventListener('keydown', onEnter);
    passwordInput.addEventListener('keydown', onEnter);
    nameInput.addEventListener('keydown', onEnter);

    signupBtn.addEventListener('click', function() {
        if (signupBtn.disabled) return;
        hideError();

        var email = emailInput.value.trim();
        var password = passwordInput.value;
        var displayName = nameInput.value.trim();

        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        signupBtn.disabled = true;
        signupBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating account...';
        signupBtn.style.opacity = '0.7';

        firebaseAuth.createUserWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                return userCredential.user.updateProfile({
                    displayName: displayName
                }).then(function() {
                    return firebaseDb.collection('users').doc(userCredential.user.uid).set({
                        name: displayName,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }).then(function() {
                    try {
                        var profile = { name: displayName, onboarded: false };
                        localStorage.setItem('uniflow_profile', JSON.stringify(profile));
                    } catch(e) {}
                    window.location.href = './01.html';
                });
            })
            .catch(function(error) {
                var msg = 'Sign up failed. ';
                switch (error.code) {
                    case 'auth/email-already-in-use': msg = 'This email is already registered. Try logging in instead.'; break;
                    case 'auth/invalid-email': msg = 'Please enter a valid email address.'; break;
                    case 'auth/weak-password': msg = 'Password is too weak. Use at least 6 characters.'; break;
                    case 'auth/too-many-requests': msg = 'Too many attempts. Please try again later.'; break;
                    case 'auth/network-request-failed': msg = 'Network error. Please check your internet connection.'; break;
                    default: msg = error.message || 'Something went wrong. Please try again.';
                }
                showError(msg);
                signupBtn.disabled = false;
                signupBtn.innerHTML = '<span class="material-symbols-outlined">person_add</span> Create Account';
                signupBtn.style.opacity = '1';
            });
    });
})();
</script>
</body>
</html>

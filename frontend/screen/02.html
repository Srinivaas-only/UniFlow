<meta charset="utf-8"/>

<title>UniFlow | Schedule</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#12111A; }
    .bg-glow-violet { background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(214,196,255,0.14) 0%,transparent 65%); }
    .bg-glow-rose { background:radial-gradient(ellipse 70% 50% at 85% 75%,rgba(255,194,220,0.08) 0%,transparent 60%); }
    .custom-scrollbar::-webkit-scrollbar { width:4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(158,151,179,0.25); border-radius:10px; }
    .time-slot { min-height:60px; border-bottom:1px solid rgba(255,255,255,0.04); }
    .time-label { width:56px; flex-shrink:0; }
    .day-col { flex:1; min-width:0; }
    .event-block { transition:all 0.2s; cursor:pointer; }
    .event-block:hover { transform:scale(1.02); z-index:10; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn 0.3s ease-out forwards; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation:fadeInUp 0.4s ease-out forwards; }
    .today-col { background:rgba(214,196,255,0.03); }
    .cal-grid { display:flex; }
    .cal-body { overflow-y:auto; max-height:calc(100vh - 220px); }
    .cal-body::-webkit-scrollbar { width:4px; }
    .cal-body::-webkit-scrollbar-thumb { background:rgba(158,151,179,0.2); border-radius:10px; }
    .nav-btn:hover { background:rgba(214,196,255,0.15); }
    .nav-btn:active { transform:scale(0.95); }
    .view-toggle-active { background:rgba(214,196,255,0.2); color:#D6C4FF; }
    .overlap-warn { animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
</style>
</head>
<body class="bg-background text-on-surface">
<div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-glow-violet"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[65%] h-[65%] bg-glow-rose"></div>
</div>

<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<!-- Event Detail Modal -->
<div id="event-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" style="display:none;">
    <div class="bg-surface-container-high rounded-3xl p-6 max-w-md w-full shadow-2xl border border-outline-variant/20 fade-in-up">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-headline-sm font-bold text-primary" id="modal-title">Event</h3>
            <button onclick="closeModal()" class="p-2 rounded-xl hover:bg-surface-container-highest transition-colors">
                <span class="material-symbols-outlined text-on-surface-variant">close</span>
            </button>
        </div>
        <div id="modal-body" class="space-y-3"></div>
        <div class="flex gap-3 mt-5">
            <button id="modal-toggle-btn" onclick="toggleModalEvent()" class="flex-1 py-2.5 bg-primary text-on-primary rounded-2xl font-bold text-label-sm hover:brightness-110 active:scale-[0.97] transition-all">Mark Complete</button>
            <button id="modal-delete-btn" onclick="deleteModalEvent()" class="py-2.5 px-4 bg-rose-500/10 text-rose-400 rounded-2xl font-bold text-label-sm hover:bg-rose-500/20 active:scale-[0.97] transition-all">Delete</button>
        </div>
    </div>
</div>

<main class="md:ml-[280px] pt-20 h-screen flex flex-col relative">
    <div id="auth-loading"></div>
<div id="page-content" class="flex-1 overflow-y-auto custom-scrollbar px-margin-mobile md:px-margin-desktop pr-4 pb-24 max-w-6xl">
        <!-- Top Bar -->
        <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
            <div class="flex items-center gap-3 flex-wrap">
                <button onclick="navigateWeek(-1)" class="nav-btn p-2 rounded-xl transition-all">
                    <span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
                </button>
                <h2 class="text-headline-sm font-bold text-on-surface min-w-[200px] text-center" id="week-label">This Week</h2>
                <button onclick="navigateWeek(1)" class="nav-btn p-2 rounded-xl transition-all">
                    <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
                </button>
                <button onclick="goToday()" class="px-4 py-2 bg-primary/10 text-primary rounded-2xl text-label-sm font-bold hover:bg-primary/20 active:scale-[0.97] transition-all">Today</button>
                <button onclick="syncUniCalendar()" id="sync-uni-btn" class="px-4 py-2 bg-secondary/10 text-secondary rounded-2xl text-label-sm font-bold hover:bg-secondary/20 active:scale-[0.97] transition-all flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-[16px]">sync</span>UM Calendar
                </button>
                <button onclick="pullFromSpectrum()" id="spectrum-btn" class="px-4 py-2 bg-violet-400/10 text-violet-400 rounded-2xl text-label-sm font-bold hover:bg-violet-400/20 active:scale-[0.97] transition-all flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-[16px]">cloud_download</span>Spectrum
                </button>
            </div>
            <div class="flex items-center gap-2 bg-surface-container-high rounded-2xl p-1">
                <button onclick="setView('week')" id="view-week" class="px-4 py-2 rounded-xl text-label-sm font-bold transition-all view-toggle-active">Week</button>
                <button onclick="setView('month')" id="view-month" class="px-4 py-2 rounded-xl text-label-sm font-bold transition-all text-on-surface-variant hover:text-primary">Month</button>
            </div>
        </div>

        <!-- Legend -->
        <div class="flex items-center gap-4 mb-4 flex-wrap">
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-rose-400"></span><span class="text-[11px] text-on-surface-variant">Exam</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-400"></span><span class="text-[11px] text-on-surface-variant">Assignment</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-amber-400"></span><span class="text-[11px] text-on-surface-variant">Class</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-purple-400"></span><span class="text-[11px] text-on-surface-variant">Meeting</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-400"></span><span class="text-[11px] text-on-surface-variant">Social</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-gray-400"></span><span class="text-[11px] text-on-surface-variant">Other</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-cyan-400"></span><span class="text-[11px] text-on-surface-variant">Uni Event</span></div>
            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-violet-400"></span><span class="text-[11px] text-on-surface-variant">Spectrum</span></div>
        </div>

        <!-- Calendar Container -->
        <div id="calendar-container" class="bg-surface-container/30 rounded-3xl border border-outline-variant/10 overflow-hidden"></div>

        <!-- Spectrum Sync Banner -->
        <div id="spectrum-banner" style="display:none" class="fade-in-up bg-violet-500/10 border border-violet-400/20 rounded-2xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-violet-400 text-2xl">cloud_download</span>
                <div>
                    <span id="spectrum-banner-text" class="text-label-sm font-bold text-violet-300">📥 0 new items from Spectrum</span>
                    <p class="text-[11px] text-on-surface-variant">Click to merge into your schedule</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="mergeSpectrumPending()" class="px-4 py-2 bg-violet-500/20 text-violet-300 rounded-xl text-label-sm font-bold hover:bg-violet-500/30 active:scale-[0.97] transition-all">Merge</button>
                <button onclick="dismissSpectrumBanner()" class="px-3 py-2 text-on-surface-variant hover:text-rose-400 transition-all">
                    <span class="material-symbols-outlined text-lg">close</span>
                </button>
            </div>
        </div>

        <!-- Spectrum Sync Indicator -->
        <div id="spectrum-sync-indicator" style="display:none" class="text-[11px] text-on-surface-variant opacity-50 text-right mt-1">
            <span class="material-symbols-outlined text-[12px] align-middle">schedule</span>
            <span id="spectrum-sync-time"></span>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-center" style="display:none;">
            <div class="w-14 h-14 rounded-3xl bg-surface-container-high flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-on-surface-variant text-3xl">calendar_month</span>
            </div>
            <h3 class="text-headline-sm text-on-surface-variant mb-2">No events this week</h3>
            <p class="text-on-surface-variant text-body-md max-w-sm">Head to the <a href="09.html" class="text-primary font-bold hover:underline">AI Command Hub</a> to add events by typing naturally.</p>
        </div>
    </div>
</main>

<script>
var TYPE_COLORS = {
    exam:       { bg:'bg-rose-400', text:'text-rose-400', light:'bg-rose-500/15', border:'border-rose-400/30' },
    assignment: { bg:'bg-blue-400', text:'text-blue-400', light:'bg-blue-500/15', border:'border-blue-400/30' },
    meeting:    { bg:'bg-purple-400', text:'text-purple-400', light:'bg-purple-500/15', border:'border-purple-400/30' },
    class:      { bg:'bg-amber-400', text:'text-amber-400', light:'bg-amber-500/15', border:'border-amber-400/30' },
    social:     { bg:'bg-emerald-400', text:'text-emerald-400', light:'bg-emerald-500/15', border:'border-emerald-400/30' },
    deadline:   { bg:'bg-red-400', text:'text-red-400', light:'bg-red-500/15', border:'border-red-400/30' },
    reminder:   { bg:'bg-cyan-400', text:'text-cyan-400', light:'bg-cyan-500/15', border:'border-cyan-400/30' },
    other:      { bg:'bg-gray-400', text:'text-gray-400', light:'bg-gray-500/15', border:'border-gray-400/30' },
    uni_event:  { bg:'bg-cyan-400', text:'text-cyan-400', light:'bg-cyan-500/15', border:'border-cyan-400/30' },
    spectrum:   { bg:'bg-violet-400', text:'text-violet-400', light:'bg-violet-500/15', border:'border-violet-400/30' },
};
var TYPE_ICONS = {
    exam:'quiz', assignment:'assignment', meeting:'groups', class:'school',
    social:'celebration', deadline:'alarm', reminder:'notifications', other:'event',
    uni_event:'school', spectrum:'cloud_download'
};

var currentWeekStart = getMonday(new Date());
var currentView = 'week';
var currentModalEventId = null;

function getMonday(d) {
    d = new Date(d);
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    d.setHours(0,0,0,0);
    return d;
}

function fmt(d) {
    return d.toISOString().slice(0,10);
}

function escapeHtml(t) { var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('02');
    renderHeader({ title:'Schedule', subtitle:'Your Calendar' });
    initAuthGuard({ onAuthenticated: function() {
        autoJumpToEvents();
        renderCalendar();
        checkSpectrumPending();
        updateSyncIndicator();
    } });
    // Listen for bridge data from the Chrome extension web_bridge.js
    window.addEventListener('uniflow:spectrum-data-ready', function() {
        autoJumpToEvents();
        checkSpectrumPending();
        updateSyncIndicator();
        renderCalendar();
    });
});

function navigateWeek(dir) {
    currentWeekStart.setDate(currentWeekStart.getDate() + dir * 7);
    renderCalendar();
}
function goToday() {
    currentWeekStart = getMonday(new Date());
    renderCalendar();
}

function autoJumpToEvents() {
    var events = Store.getEvents().filter(function(e) { return e.type !== 'expense'; });
    var dated = events.filter(function(e) { return e.date; });
    if (dated.length === 0) return;
    // Check if current week already has dated events
    var we = new Date(currentWeekStart);
    we.setDate(we.getDate() + 6);
    var ws = fmt(currentWeekStart), we2 = fmt(we);
    var inWeek = dated.filter(function(e) { return e.date >= ws && e.date <= we2; });
    if (inWeek.length > 0) return;
    // Navigate to the nearest week with events
    var sorted = dated.slice().sort(function(a,b) { return a.date.localeCompare(b.date); });
    var target = sorted[0];
    if (target && target.date) {
        var d = new Date(target.date + 'T00:00:00');
        if (!isNaN(d)) currentWeekStart = getMonday(d);
    }
}

function jumpToNextEvents() {
    var events = Store.getEvents().filter(function(e) { return e.type !== 'expense'; });
    var dated = events.filter(function(e) { return e.date; });
    if (dated.length === 0) return;
    var today = fmt(new Date());
    var future = dated.filter(function(e) { return e.date > today; })
        .sort(function(a,b) { return a.date.localeCompare(b.date); });
    var target = future.length > 0 ? future[0] : dated.sort(function(a,b) { return a.date.localeCompare(b.date); })[0];
    if (target && target.date) {
        var d = new Date(target.date + 'T00:00:00');
        if (!isNaN(d)) currentWeekStart = getMonday(d);
    }
    renderCalendar();
}

function setView(v) {
    currentView = v;
    document.getElementById('view-week').className = 'px-4 py-2 rounded-xl text-label-sm font-bold transition-all ' + (v==='week'?'view-toggle-active':'text-on-surface-variant hover:text-primary');
    document.getElementById('view-month').className = 'px-4 py-2 rounded-xl text-label-sm font-bold transition-all ' + (v==='month'?'view-toggle-active':'text-on-surface-variant hover:text-primary');
    renderCalendar();
}

function renderCalendar() {
    var container = document.getElementById('calendar-container');
    var emptyState = document.getElementById('empty-state');
    // Include ALL non-expense events, even those without dates
    var events = Store.getEvents().filter(function(e) { return e.type !== 'expense'; });
    var uniEvents = Store.getUniEvents();

    // Debug: log Spectrum events to help diagnose calendar issues
    var spectrumInStore = events.filter(function(e) { return e.source === 'spectrum'; });
    if (spectrumInStore.length > 0) {
        console.log('[UniFlow Calendar] ' + spectrumInStore.length + ' Spectrum events in Store. Dates:', spectrumInStore.map(function(e) { return e.date || '(no date)'; }).join(', '));
    }

    // Update week label
    var endOfWeek = new Date(currentWeekStart);
    endOfWeek.setDate(endOfWeek.getDate() + 6);
    var label = currentWeekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' + endOfWeek.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('week-label').textContent = label;

    if (currentView === 'week') {
        renderWeekView(container, events, uniEvents);
    } else {
        renderMonthView(container, events, uniEvents);
    }

    // Check if current view week has events (not just globally)
    var datedEvents = events.filter(function(e) { return e.date; });
    var globalHasEvents = datedEvents.length > 0 || uniEvents.length > 0;
    var _we = new Date(currentWeekStart); _we.setDate(_we.getDate() + 6);
    var _ws = fmt(currentWeekStart), _we2 = fmt(_we);
    var viewDated = datedEvents.filter(function(e) { return e.date >= _ws && e.date <= _we2; });
    var viewUni = uniEvents.filter(function(ue) { return ue.date && ue.date >= _ws && ue.date <= _we2; });
    var viewHasEvents = viewDated.length > 0 || viewUni.length > 0;
    container.style.display = globalHasEvents ? 'block' : 'none';
    if (!viewHasEvents && globalHasEvents) {
        emptyState.style.display = 'flex';
        var etH3 = emptyState.querySelector('h3');
        var etP = emptyState.querySelector('p');
        if (etH3) etH3.textContent = 'No events this week';
        if (etP) etP.innerHTML = 'Events exist in other weeks. <button onclick="jumpToNextEvents()" class="text-primary font-bold hover:underline">Jump to next events →</button>';
    } else {
        emptyState.style.display = viewHasEvents ? 'none' : 'flex';
    }
}

function renderWeekView(container, events, uniEvents) {
    var today = fmt(new Date());
    var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var hours = [];
    for (var h=7; h<=22; h++) hours.push(h);

    // Group events by day — only events with dates that fall in this week
    var eventsByDay = {};
    for (var i=0; i<7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        eventsByDay[fmt(d)] = [];
    }

    // Add all dated events to their day (Store.events already includes Spectrum events)
    events.forEach(function(evt) {
        if (evt.date && eventsByDay[evt.date]) eventsByDay[evt.date].push(evt);
    });

    // Also add uni events to the day groups
    uniEvents.forEach(function(ue) {
        if (!ue.date) return;
        var d = ue.date;
        if (eventsByDay[d]) {
            eventsByDay[d].push({
                id: 'uni_' + d + '_' + ue.title.replace(/\s/g,'').slice(0,10),
                title: ue.title,
                date: d,
                time: null,
                type: 'uni_event',
                completed: false,
                category: ue.category || '',
                source: ue.source || 'Universiti Malaya'
            });
        }
    });

    // Detect overlaps
    var overlaps = {};
    Object.keys(eventsByDay).forEach(function(day) {
        var dayEvents = eventsByDay[day].filter(function(e) { return e.time; });
        dayEvents.sort(function(a,b) { return (a.time||'').localeCompare(b.time||''); });
        for (var i=0; i<dayEvents.length; i++) {
            for (var j=i+1; j<dayEvents.length; j++) {
                if (dayEvents[i].time === dayEvents[j].time) {
                    overlaps[dayEvents[i].id] = true;
                    overlaps[dayEvents[j].id] = true;
                }
            }
        }
    });

    // Build header
    var html = '<div class="cal-grid border-b border-outline-variant/10">';
    html += '<div class="time-label p-2"></div>';
    for (var i=0; i<7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        var dateStr = fmt(d);
        var isToday = dateStr === today;
        html += '<div class="day-col p-2 text-center ' + (isToday?'today-col':'') + '">';
        html += '<div class="text-[10px] text-on-surface-variant uppercase tracking-wider">' + days[i] + '</div>';
        html += '<div class="text-lg font-bold ' + (isToday?'text-primary':'text-on-surface') + '">' + d.getDate() + '</div>';
        html += '</div>';
    }
    html += '</div>';

    // Build time grid
    html += '<div class="cal-body">';
    hours.forEach(function(h) {
        var timeLabel = (h < 12 ? h : h > 12 ? h-12 : 12) + (h < 12 ? 'am' : 'pm');
        html += '<div class="cal-grid time-slot">';
        html += '<div class="time-label p-2 text-[10px] text-on-surface-variant/50 text-right pr-3 pt-1">' + timeLabel + '</div>';

        for (var i=0; i<7; i++) {
            var d = new Date(currentWeekStart);
            d.setDate(d.getDate() + i);
            var dateStr = fmt(d);
            var isToday = dateStr === today;
            var dayEvents = (eventsByDay[dateStr]||[]).filter(function(e) {
                if (!e.time) return false;
                var evtHour = parseInt(e.time.split(':')[0]);
                var evtAmpm = (e.time.match(/am|pm/i)||[''])[0].toLowerCase();
                if (evtAmpm === 'pm' && evtHour !== 12) evtHour += 12;
                if (evtAmpm === 'am' && evtHour === 12) evtHour = 0;
                if (isNaN(evtHour)) {
                    // Try 24h format
                    evtHour = parseInt(e.time.split(':')[0]);
                }
                return evtHour === h;
            });

            html += '<div class="day-col p-1 border-l border-outline-variant/5 ' + (isToday?'today-col':'') + '">';
            dayEvents.forEach(function(evt) {
                var cfg = TYPE_COLORS[evt.type] || TYPE_COLORS.other;
                var icon = TYPE_ICONS[evt.type] || 'event';
                var isOverlap = overlaps[evt.id];
                html += '<div onclick="openEventModal(\'' + evt.id + '\')" class="event-block ' + cfg.light + ' ' + cfg.border + ' border rounded-xl p-2 mb-1 ' + (evt.completed?'opacity-50 line-through':'') + '">';
                if (isOverlap) html += '<span class="overlap-warn material-symbols-outlined text-amber-400 text-[12px] float-right" title="Time conflict!">warning</span>';
                html += '<div class="flex items-center gap-1"><span class="material-symbols-outlined ' + cfg.text + ' text-[14px]">' + icon + '</span>';
                html += '<span class="text-[11px] font-bold text-on-surface truncate">' + escapeHtml(evt.title) + '</span></div>';
                html += '<div class="text-[10px] text-on-surface-variant mt-0.5">' + (evt.time||'') + '</div>';
                html += '</div>';
            });

            // Also check for events without time on this day
            var noTimeEvents = (eventsByDay[dateStr]||[]).filter(function(e) { return !e.time && h === 7; });
            noTimeEvents.forEach(function(evt) {
                var cfg = TYPE_COLORS[evt.type] || TYPE_COLORS.other;
                var icon = TYPE_ICONS[evt.type] || 'event';
                html += '<div onclick="openEventModal(\'' + evt.id + '\')" class="event-block ' + cfg.light + ' ' + cfg.border + ' border rounded-xl p-2 mb-1 ' + (evt.completed?'opacity-50 line-through':'') + '">';
                html += '<div class="flex items-center gap-1"><span class="material-symbols-outlined ' + cfg.text + ' text-[14px]">' + icon + '</span>';
                html += '<span class="text-[11px] font-bold text-on-surface truncate">' + escapeHtml(evt.title) + '</span></div>';
                html += '<div class="text-[10px] text-on-surface-variant mt-0.5">All day</div>';
                html += '</div>';
            });
            html += '</div>';
        }
        html += '</div>';
    });
    html += '</div>';

    container.innerHTML = html;

    // Show undated Spectrum events in a list below the calendar grid
    var undated = events.filter(function(e) { return e.source === 'spectrum' && (!e.date || e.date === ''); });
    if (undated.length > 0) {
        var undatedHtml = '<div class="mt-4 p-4 bg-violet-500/10 border border-violet-400/20 rounded-2xl">';
        undatedHtml += '<div class="flex items-center gap-2 mb-3"><span class="material-symbols-outlined text-violet-400">cloud_download</span>';
        undatedHtml += '<span class="text-label-sm font-bold text-violet-300">' + undated.length + ' Spectrum items without dates</span>';
        undatedHtml += '<span class="text-[10px] text-on-surface-variant ml-2">(dates not available in Moodle — shown here for reference)</span></div>';
        undatedHtml += '<div class="space-y-1 max-h-[200px] overflow-y-auto custom-scrollbar">';
        undated.forEach(function(evt) {
            var typeColor = TYPE_COLORS[evt.type] || TYPE_COLORS.other;
            undatedHtml += '<div class="flex items-center gap-2 py-1 px-2 rounded-lg hover:bg-surface-container/40">';
            undatedHtml += '<span class="w-2 h-2 rounded-full ' + typeColor.bg + ' flex-shrink-0"></span>';
            undatedHtml += '<span class="text-[11px] text-on-surface truncate flex-1">' + escapeHtml(evt.title) + '</span>';
            if (evt.course_code) undatedHtml += '<span class="text-[9px] text-on-surface-variant">' + escapeHtml(evt.course_code) + '</span>';
            if (evt.source_url) undatedHtml += '<a href="' + escapeHtml(evt.source_url) + '" target="_blank" class="material-symbols-outlined text-[12px] text-on-surface-variant hover:text-primary">open_in_new</a>';
            undatedHtml += '</div>';
        });
        undatedHtml += '</div></div>';
        container.innerHTML += undatedHtml;
    }
}

function renderMonthView(container, events, uniEvents) {
    var today = fmt(new Date());
    var year = currentWeekStart.getFullYear();
    var month = currentWeekStart.getMonth();

    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);
    var startDow = firstDay.getDay() || 7; // Mon=1

    var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    // Update label
    document.getElementById('week-label').textContent = firstDay.toLocaleDateString('en-US',{month:'long',year:'numeric'});

    // Group events by date
    var eventsByDate = {};
    events.forEach(function(evt) {
        if (!evt.date) return;
        if (!eventsByDate[evt.date]) eventsByDate[evt.date] = [];
        eventsByDate[evt.date].push(evt);
    });

    // Also add uni events to month view
    uniEvents.forEach(function(ue) {
        if (!ue.date) return;
        if (!eventsByDate[ue.date]) eventsByDate[ue.date] = [];
        eventsByDate[ue.date].push({
            id: 'uni_' + ue.date + '_' + ue.title.replace(/\s/g,'').slice(0,10),
            title: ue.title,
            date: ue.date,
            time: null,
            type: 'uni_event',
            completed: false
        });
    });

    var html = '<div class="p-4">';

    // Day headers
    html += '<div class="grid grid-cols-7 gap-1 mb-2">';
    days.forEach(function(d) {
        html += '<div class="text-center text-[10px] text-on-surface-variant uppercase tracking-wider py-2">' + d + '</div>';
    });
    html += '</div>';

    // Calendar grid
    html += '<div class="grid grid-cols-7 gap-1">';
    var d = new Date(firstDay);
    d.setDate(d.getDate() - (startDow - 1));

    for (var i = 0; i < 42; i++) {
        var dateStr = fmt(d);
        var isCurrentMonth = d.getMonth() === month;
        var isToday = dateStr === today;
        var dayEvents = eventsByDate[dateStr] || [];

        html += '<div class="min-h-[80px] p-1.5 rounded-xl ' + (isToday?'bg-primary/10 border border-primary/20':'bg-surface-container/50') + ' ' + (!isCurrentMonth?'opacity-30':'') + '">';
        html += '<div class="text-[11px] font-bold mb-1 ' + (isToday?'text-primary':'text-on-surface-variant') + '">' + d.getDate() + '</div>';

        dayEvents.slice(0,3).forEach(function(evt) {
            var cfg = TYPE_COLORS[evt.type] || TYPE_COLORS.other;
            html += '<div onclick="openEventModal(\'' + evt.id + '\')" class="event-block text-[9px] truncate ' + cfg.light + ' ' + cfg.text + ' rounded px-1 py-0.5 mb-0.5 font-semibold cursor-pointer">' + escapeHtml(evt.title) + '</div>';
        });
        if (dayEvents.length > 3) {
            html += '<div class="text-[9px] text-on-surface-variant">+' + (dayEvents.length-3) + ' more</div>';
        }
        html += '</div>';
        d.setDate(d.getDate() + 1);
    }
    html += '</div></div>';
    container.innerHTML = html;
}

// -- Event Modal --
function openEventModal(id) {
    var events = Store.getEvents();
    var evt = events.find(function(e) { return e.id === id; });

    // Also check spectrum and uni events not in Store.events
    if (!evt) {
        var spectrumSync = Store._get('spectrumSync');
        if (spectrumSync && spectrumSync.events) {
            var se = spectrumSync.events.find(function(e) {
                return ('spectrum_' + (e.title || '').replace(/\s/g,'').slice(0,10) + '_' + (e.date || '')) === id;
            });
            if (se) {
                evt = {
                    id: id,
                    title: se.title,
                    date: se.date,
                    time: se.time,
                    type: 'spectrum',
                    completed: false,
                    source: 'spectrum',
                    source_url: se.source_url || '',
                    course_code: se.course_code || '',
                    course_name: se.course_name || ''
                };
            }
        }
    }

    if (!evt) return;
    currentModalEventId = evt.id || id;

    var cfg = TYPE_COLORS[evt.type] || TYPE_COLORS.other;
    var icon = TYPE_ICONS[evt.type] || 'event';
    var dateObj = new Date(evt.date + 'T00:00:00');
    var dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) : evt.date;

    // Build source badge HTML
    var sourceBadge = '';
    if (evt.source === 'spectrum' || evt.type === 'spectrum') {
        sourceBadge = '<span class="px-2 py-0.5 bg-violet-500/15 text-violet-400 rounded text-[9px] font-bold ml-2">Spectrum</span>';
    } else if (evt.type === 'uni_event') {
        sourceBadge = '<span class="px-2 py-0.5 bg-cyan-500/15 text-cyan-400 rounded text-[9px] font-bold ml-2">Uni Event</span>';
    }

    document.getElementById('modal-title').innerHTML = escapeHtml(evt.title) + sourceBadge;
    document.getElementById('modal-body').innerHTML =
        '<div class="flex items-center gap-3 p-3 ' + cfg.light + ' rounded-2xl">' +
            '<span class="material-symbols-outlined ' + cfg.text + ' text-2xl">' + icon + '</span>' +
            '<div><div class="text-label-sm font-bold capitalize ' + cfg.text + '">' + (evt.type || '').replace('_',' ') + '</div></div>' +
            (evt.completed ? '<span class="ml-auto material-symbols-outlined text-primary">check_circle</span>' : '') +
        '</div>' +
        '<div class="space-y-2 text-on-surface-variant">' +
            '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-lg">calendar_today</span><span class="text-body-md">' + dateStr + '</span></div>' +
            (evt.time ? '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-lg">schedule</span><span class="text-body-md">' + evt.time + '</span></div>' : '') +
            (evt.course_code ? '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-lg">school</span><span class="text-body-md">' + escapeHtml(evt.course_code) + (evt.course_name ? ' — ' + escapeHtml(evt.course_name) : '') + '</span></div>' : '') +
        '</div>';

    // Spectrum events get "Open in Spectrum" button instead of toggle/delete
    var isSpectrum = evt.source === 'spectrum' || evt.type === 'spectrum';
    var isUni = evt.type === 'uni_event';

    if (isSpectrum || isUni) {
        var url = evt.source_url || '';
        document.getElementById('modal-toggle-btn').style.display = url ? 'flex' : 'none';
        document.getElementById('modal-toggle-btn').innerHTML = '<span class="material-symbols-outlined text-[16px]">open_in_new</span> Open' + (isSpectrum ? ' in Spectrum' : '');
        document.getElementById('modal-toggle-btn').onclick = function() {
            if (url) window.open(url, '_blank');
        };
        document.getElementById('modal-delete-btn').style.display = 'none';
    } else {
        document.getElementById('modal-toggle-btn').style.display = 'flex';
        document.getElementById('modal-toggle-btn').textContent = evt.completed ? 'Mark Incomplete' : 'Mark Complete';
        document.getElementById('modal-toggle-btn').onclick = function() { toggleModalEvent(); };
        document.getElementById('modal-delete-btn').style.display = 'inline-flex';
    }

    document.getElementById('event-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('event-modal').style.display = 'none';
    currentModalEventId = null;
}

function toggleModalEvent() {
    if (currentModalEventId) {
        Store.toggleEventComplete(currentModalEventId);
        closeModal();
        renderCalendar();
    }
}

function deleteModalEvent() {
    if (currentModalEventId) {
        var events = Store.getEvents().filter(function(e) { return e.id !== currentModalEventId; });
        Store._set('events', events);
        closeModal();
        renderCalendar();
    }
}

// Close modal on backdrop click
document.getElementById('event-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ── Sync UM Calendar ──
async function syncUniCalendar() {
    var btn = document.getElementById('sync-uni-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-[16px] searching-spin">sync</span>Syncing...';
    try {
        var data = await Store.scrapeUniCalendar('UM');
        var events = data.events || [];
        if (events.length === 0) {
            Toast.show('No calendar events found. Try again later.', 'warning');
            return;
        }
        // Convert to store format and save
        var uniEvents = events.map(function(e) {
            return {
                title: e.title,
                date: _parseCalDate(e.date),
                time: null,
                type: 'uni_event',
                category: e.category || '',
                end_date: e.end_date || '',
                description: e.description || '',
                source: 'Universiti Malaya'
            };
        });
        Store.setUniEvents(uniEvents);
        renderCalendar();
        Toast.show(uniEvents.length + ' UM calendar events synced!', 'success');
    } catch(err) {
        Toast.show('Failed to sync calendar: ' + (err.message || 'Unknown error'), 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">sync</span>Sync UM Calendar';
    }
}

function _parseCalDate(dateStr) {
    // Handle DD-MM-YYYY
    var m = dateStr.match(/^(\d{2})-(\d{2})-(\d{4})$/);
    if (m) return m[3] + '-' + m[2] + '-' + m[1];
    // Handle DD/MM/YYYY
    m = dateStr.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (m) return m[3] + '-' + m[2] + '-' + m[1];
    // Handle "3 June 2026"
    try {
        var d = new Date(dateStr);
        if (!isNaN(d)) return d.toISOString().slice(0, 10);
    } catch(e) {}
    return dateStr;
}

// ── Pull from Spectrum (Chrome extension) ──
async function pullFromSpectrum() {
    var btn = document.getElementById('spectrum-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-[16px] searching-spin">sync</span>Pulling...';
    try {
        // STEP 1: Check if bridge wrote sync data we haven't consumed yet
        var lastSync = Store._get('spectrumSync');
        if (lastSync && lastSync.events && lastSync.events.length > 0) {
            mergeSpectrumPending();
        }

        // STEP 2: Check if bridge already merged events directly into Store
        var allEvents = Store.getEvents();
        var spectrumEvts = allEvents.filter(function(e) { return e.source === 'spectrum'; });

        // STEP 3: If nothing in Store, try to find raw bridge data in localStorage
        if (spectrumEvts.length === 0) {
            // The bridge writes events to uniflow_events — let's check directly
            var rawEvents = localStorage.getItem('uniflow_events');
            if (rawEvents) {
                try {
                    var parsed = JSON.parse(rawEvents);
                    console.log('[Pull Spectrum] Raw uniflow_events count:', parsed.length);
                    spectrumEvts = parsed.filter(function(e) { return e.source === 'spectrum'; });
                    console.log('[Pull Spectrum] Spectrum events in raw data:', spectrumEvts.length);
                } catch(e2) {
                    console.log('[Pull Spectrum] Failed to parse raw events');
                }
            } else {
                console.log('[Pull Spectrum] No uniflow_events key in localStorage at all');
            }
        }

        // STEP 4: Check if there's data in chrome.storage that bridge hasn't picked up
        // (we can't read chrome.storage from the page, but we can check spectrumSync)
        var syncData = Store._get('spectrumSync');
        console.log('[Pull Spectrum] spectrumSync exists:', !!syncData);
        if (syncData) {
            console.log('[Pull Spectrum] spectrumSync events:', (syncData.events || []).length);
            console.log('[Pull Spectrum] spectrumSync resources:', (syncData.resources || []).length);
        }

        console.log('[Pull Spectrum] FINAL: spectrumEvts.length =', spectrumEvts.length);
        console.log('[Pull Spectrum] FINAL: allEvents.length =', allEvents.length);

        if (spectrumEvts.length > 0) {
            // Navigate to the week of the nearest FUTURE dated event
            var today = new Date().toISOString().slice(0, 10);
            var futureDated = spectrumEvts.filter(function(e) { return e.date && e.date >= today; })
                .sort(function(a, b) { return a.date.localeCompare(b.date); });
            var target = futureDated.length > 0 ? futureDated[0] : spectrumEvts.find(function(e) { return e.date; });
            if (target && target.date) {
                var targetDate = new Date(target.date + 'T00:00:00');
                if (!isNaN(targetDate)) {
                    currentWeekStart = getMonday(targetDate);
                }
            } else {
                // No dated events — stay on current week
                currentWeekStart = getMonday(new Date());
            }
            updateSyncIndicator();
            renderCalendar();
            var dated = spectrumEvts.filter(function(e) { return e.date; }).length;
            Toast.show(spectrumEvts.length + ' Spectrum events loaded (' + dated + ' with dates)!', 'success');
        } else {
            Toast.show('No Spectrum events found. Import from the extension first, then come back.', 'warning');
            console.log('[Pull Spectrum] DUMP of all localStorage keys starting with uniflow_:');
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                if (key.indexOf('uniflow_') === 0) {
                    var val = localStorage.getItem(key);
                    console.log('  ' + key + ': ' + (val ? val.substring(0, 120) + '...' : '(empty)'));
                }
            }
        }
    } catch(err) {
        console.error('[Pull Spectrum] Error:', err);
        Toast.show('Failed to pull: ' + (err.message || 'Unknown error'), 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">cloud_download</span>Pull Spectrum';
    }
}

// ── Spectrum Pending Banner ──
function checkSpectrumPending() {
    var sync = Store._get('spectrumSync');
    var banner = document.getElementById('spectrum-banner');
    var bannerText = document.getElementById('spectrum-banner-text');

    if (sync && sync.events && sync.events.length > 0) {
        // Check if these events are already merged into Store.events
        var alreadyMerged = Store.getEvents().filter(function(e) { return e.source === 'spectrum'; });
        var unmergedCount = sync.events.filter(function(se) {
            return !alreadyMerged.some(function(e) { return e.title === se.title && e.date === se.date; });
        }).length;

        if (unmergedCount > 0) {
            bannerText.textContent = '📥 ' + unmergedCount + ' new item' + (unmergedCount !== 1 ? 's' : '') + ' from Spectrum';
            banner.style.display = 'flex';
        } else {
            // Already merged, clean up
            Store._set('spectrumSync', null);
            banner.style.display = 'none';
        }
    } else {
        banner.style.display = 'none';
    }
}

function mergeSpectrumPending() {
    var sync = Store._get('spectrumSync');
    if (!sync || !sync.events || sync.events.length === 0) {
        Toast.show('No pending Spectrum data.', 'warning');
        return;
    }

    // Dedupe against existing events (match on title + source_url for items without dates)
    var existingEvents = Store.getEvents();
    var newEvents = sync.events.filter(function(se) {
        return !existingEvents.some(function(e) {
            if (e.source !== 'spectrum') return false;
            // If both have dates, match on title + date
            if (se.date && e.date) return e.title === se.title && e.date === se.date;
            // If no dates, match on title + source_url
            return e.title === se.title && (e.source_url || '') === (se.source_url || '');
        });
    });

    if (newEvents.length === 0) {
        Toast.show('All Spectrum events are already in your schedule.', 'info');
        Store._set('spectrumSync', null);
        document.getElementById('spectrum-banner').style.display = 'none';
        return;
    }

    var added = Store.addEvents(newEvents.map(function(e) {
        return {
            title: e.title,
            date: e.date,
            time: e.time,
            type: e.type || 'other',
            source: 'spectrum',
            source_url: e.source_url || '',
            course_code: e.course_code || '',
            course_name: e.course_name || ''
        };
    }));

    // Store the sync time for the indicator
    Store._set('lastSpectrumSyncTime', sync.synced_at || new Date().toISOString());

    // Clear pending data
    Store._set('spectrumSync', null);

    // Also store resources for Resources screen
    if (sync.resources && sync.resources.length > 0) {
        Store.addSpectrumResources(sync.resources);
    }

    // Hide banner, update indicator, re-render
    document.getElementById('spectrum-banner').style.display = 'none';
    updateSyncIndicator();
    renderCalendar();
    Toast.show(added.length + ' Spectrum events added to schedule!', 'success');
}

function dismissSpectrumBanner() {
    document.getElementById('spectrum-banner').style.display = 'none';
}

function updateSyncIndicator() {
    var indicator = document.getElementById('spectrum-sync-indicator');
    var timeEl = document.getElementById('spectrum-sync-time');
    var syncTime = Store._get('lastSpectrumSyncTime');

    // Also check spectrum events in Store.events for last sync time
    if (!syncTime) {
        var spectrumEvts = Store.getEvents().filter(function(e) { return e.source === 'spectrum'; });
        if (spectrumEvts.length > 0) {
            syncTime = spectrumEvts[0].createdAt || null;
        }
    }

    if (syncTime) {
        try {
            var dt = new Date(syncTime);
            var now = new Date();
            var diffMs = now - dt;
            var diffMins = Math.floor(diffMs / 60000);
            var diffHrs = Math.floor(diffMs / 3600000);

            if (diffMins < 1) {
                timeEl.textContent = 'Last Spectrum sync: just now';
            } else if (diffMins < 60) {
                timeEl.textContent = 'Last Spectrum sync: ' + diffMins + ' min' + (diffMins !== 1 ? 's' : '') + ' ago';
            } else if (diffHrs < 24) {
                timeEl.textContent = 'Last Spectrum sync: ' + diffHrs + ' hr' + (diffHrs !== 1 ? 's' : '') + ' ago';
            } else {
                timeEl.textContent = 'Last Spectrum sync: ' + dt.toLocaleDateString('en-MY', { day: 'numeric', month: 'short' });
            }
            indicator.style.display = 'block';
        } catch(e) {
            indicator.style.display = 'none';
        }
    } else {
        indicator.style.display = 'none';
    }
}

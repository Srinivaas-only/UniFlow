<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>Group Projects | UniFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../theme.css" rel="stylesheet"/>
<style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#12111A; overflow-x:hidden; }
    .bg-glow-violet { background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(214,196,255,0.14) 0%,transparent 65%); }
    .bg-glow-rose { background:radial-gradient(ellipse 70% 50% at 85% 75%,rgba(255,194,220,0.08) 0%,transparent 60%); }
    .custom-scrollbar::-webkit-scrollbar { width:4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(158,151,179,0.25); border-radius:10px; }
    .modal-backdrop { background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation:fadeInUp 0.5s ease-out forwards; opacity:0; }
    .group-card { transition:transform 0.2s,box-shadow 0.2s; }
    .group-card:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
</style>
</head>
<body class="bg-background min-h-screen text-on-surface">
<div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-glow-violet"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[65%] h-[65%] bg-glow-rose"></div>
</div>

<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 h-screen overflow-y-auto custom-scrollbar">
    <div class="px-margin-mobile md:px-margin-desktop pr-4 pb-24 space-y-6">
        <div class="flex justify-between items-center fade-in-up" style="animation-delay:0ms">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-purple-500/15 rounded-2xl">
                    <span class="material-symbols-outlined text-purple-400">group_work</span>
                </div>
                <div>
                    <h2 class="text-headline-sm font-bold text-on-surface">Group Projects</h2>
                    <p class="text-label-sm text-on-surface-variant">Collaborate with your teammates</p>
                </div>
            </div>
            <button onclick="openCreateModal()" class="bg-primary text-on-primary px-6 py-3 rounded-2xl font-bold hover:brightness-110 active:scale-[0.97] transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">add</span> New Group
            </button>
        </div>

        <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <!-- Empty state rendered by JS -->
        </div>
    </div>
</main>

<!-- Create Group Modal -->
<div id="create-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="bg-surface-container-high rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl border border-outline-variant/20 fade-in-up">
        <div class="flex items-center gap-3 mb-6">
            <div class="p-2.5 bg-purple-500/15 rounded-2xl">
                <span class="material-symbols-outlined text-purple-400">add_circle</span>
            </div>
            <h3 class="text-headline-sm font-bold">Create New Group</h3>
        </div>
        <input id="group-name-input" type="text" placeholder="e.g. FYP Team, OS Project..." class="w-full bg-surface-container rounded-2xl px-4 py-3 text-on-surface border border-outline-variant/30 focus:border-primary outline-none transition-all mb-6">
        <div class="flex gap-3 justify-end">
            <button onclick="closeCreateModal()" class="px-6 py-2.5 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-all">Cancel</button>
            <button onclick="createGroup()" class="bg-primary text-on-primary px-6 py-2.5 rounded-2xl font-bold hover:brightness-110 transition-all">Create</button>
        </div>
    </div>
</div>

<!-- Group Detail Modal -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="bg-surface-container-high rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl border border-outline-variant/20 max-h-[80vh] overflow-y-auto custom-scrollbar">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-purple-500/15 rounded-2xl">
                    <span class="material-symbols-outlined text-purple-400">groups</span>
                </div>
                <h3 class="text-headline-sm font-bold" id="detail-title">Group</h3>
            </div>
            <button onclick="closeDetailModal()" class="p-2 rounded-xl hover:bg-surface-container text-on-surface-variant hover:text-on-surface transition-all">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Members -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-label-sm font-bold text-on-surface-variant uppercase tracking-widest">Members</h4>
                <button onclick="addMember()" class="text-primary text-label-sm font-bold hover:underline">+ Add</button>
            </div>
            <div id="detail-members" class="flex flex-wrap gap-2"></div>
        </div>
        <!-- Tasks -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-label-sm font-bold text-on-surface-variant uppercase tracking-widest">Tasks</h4>
                <button onclick="addTask()" class="text-primary text-label-sm font-bold hover:underline">+ Add</button>
            </div>
            <div id="detail-tasks" class="space-y-2"></div>
        </div>
    </div>
</div>

<div id="bottomnav-mount"></div>
<script src="../js/components/sidebar.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/bottomNav.js"></script>
<script src="../js/store.js"></script>
<script src="../js/components/notifications.js"></script>

<script>
var currentGroupId = null;
document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('06');
    renderHeader({ title:'Group Projects', subtitle:'Collaborate' });
    renderBottomNav('06');
    renderGroups();
});

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderGroups() {
    var groups = Store.getGroups();
    var container = document.getElementById('groups-container');
    if (groups.length === 0) {
        container.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 text-center fade-in-up">' +
            '<div class="w-14 h-14 rounded-3xl bg-purple-500/10 flex items-center justify-center mb-4">' +
                '<span class="material-symbols-outlined text-purple-400 text-3xl">group_work</span>' +
            '</div>' +
            '<h3 class="text-headline-sm text-on-surface-variant mb-2">No groups yet</h3>' +
            '<p class="text-on-surface-variant text-body-md max-w-sm">Create a group to start collaborating with your teammates.</p>' +
        '</div>';
        return;
    }
    container.innerHTML = groups.map(function(g, idx) {
        var taskDone = g.tasks.filter(function(t){return t.done}).length;
        var taskTotal = g.tasks.length;
        var pct = taskTotal ? Math.round(taskDone / taskTotal * 100) : 0;
        return '<div class="group-card bg-surface-container/60 backdrop-blur-xl rounded-3xl p-6 border border-outline-variant/10 cursor-pointer fade-in-up" style="animation-delay:' + (idx*80) + 'ms" onclick="openDetail(\'' + g.id + '\')">' +
            '<div class="flex justify-between items-start mb-4">' +
                '<div class="flex items-center gap-3">' +
                    '<div class="p-2 bg-purple-500/15 rounded-xl"><span class="material-symbols-outlined text-purple-400">groups</span></div>' +
                    '<h4 class="font-bold text-label-lg text-on-surface">' + escapeHtml(g.name) + '</h4>' +
                '</div>' +
                '<button onclick="event.stopPropagation(); deleteGroup(\'' + g.id + '\')" class="p-1.5 rounded-xl hover:bg-rose-500/10 text-on-surface-variant hover:text-rose-400 transition-all"><span class="material-symbols-outlined text-lg">delete</span></button>' +
            '</div>' +
            '<div class="flex items-center gap-4 mb-4">' +
                '<span class="text-label-sm text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-sm">person</span>' + g.members.length + '</span>' +
                '<span class="text-label-sm text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-sm">task_alt</span>' + taskDone + '/' + taskTotal + '</span>' +
            '</div>' +
            '<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-purple-500 to-purple-400 rounded-full" style="width:' + pct + '%;"></div></div>' +
            '<p class="text-[10px] text-on-surface-variant mt-2">' + pct + '% complete</p>' +
        '</div>';
    }).join('');
}

function openCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('create-modal').classList.add('flex'); document.getElementById('group-name-input').focus(); }
function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); document.getElementById('create-modal').classList.remove('flex'); }
function createGroup() { var name = document.getElementById('group-name-input').value.trim(); if (!name) return; Store.createGroup(name); document.getElementById('group-name-input').value = ''; closeCreateModal(); renderGroups(); }
function deleteGroup(id) { if (confirm('Delete this group?')) { Store.deleteGroup(id); renderGroups(); } }

function openDetail(id) {
    currentGroupId = id;
    var group = Store.getGroups().find(function(g){return g.id === id});
    if (!group) return;
    document.getElementById('detail-title').textContent = group.name;
    document.getElementById('detail-members').innerHTML = group.members.map(function(m, i) {
        return '<span class="inline-flex items-center gap-1 px-3 py-1.5 bg-purple-500/10 text-purple-400 rounded-2xl text-label-sm font-semibold">' + escapeHtml(m) + '<button onclick="removeMember(' + i + ')" class="ml-1 hover:text-rose-400 transition-colors">×</button></span>';
    }).join('');
    document.getElementById('detail-tasks').innerHTML = group.tasks.map(function(t, i) {
        return '<div class="flex items-center gap-3 p-3 bg-surface-container/50 rounded-2xl hover:bg-surface-container/70 transition-all">' +
            '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTask(' + i + ')" class="accent-purple-400 cursor-pointer w-4 h-4">' +
            '<span class="flex-1 ' + (t.done ? 'line-through opacity-50' : '') + '">' + escapeHtml(t.text) + '</span>' +
            '<button onclick="removeTask(' + i + ')" class="p-1 text-on-surface-variant hover:text-rose-400 transition-colors"><span class="material-symbols-outlined text-sm">close</span></button>' +
        '</div>';
    }).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
    document.getElementById('detail-modal').classList.add('flex');
}
function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); document.getElementById('detail-modal').classList.remove('flex'); currentGroupId = null; renderGroups(); }

function addMember() { var name = prompt('Member name:'); if (!name || !currentGroupId) return; var groups = Store.getGroups(); var g = groups.find(function(gr){return gr.id===currentGroupId}); if (g) { g.members.push(name.trim()); Store.saveGroup(g); openDetail(currentGroupId); } }
function removeMember(idx) { if (!currentGroupId) return; var groups = Store.getGroups(); var g = groups.find(function(gr){return gr.id===currentGroupId}); if (g) { g.members.splice(idx, 1); Store.saveGroup(g); openDetail(currentGroupId); } }
function addTask() { var text = prompt('Task description:'); if (!text || !currentGroupId) return; var groups = Store.getGroups(); var g = groups.find(function(gr){return gr.id===currentGroupId}); if (g) { g.tasks.push({text:text.trim(),done:false}); Store.saveGroup(g); openDetail(currentGroupId); } }
function removeTask(idx) { if (!currentGroupId) return; var groups = Store.getGroups(); var g = groups.find(function(gr){return gr.id===currentGroupId}); if (g) { g.tasks.splice(idx, 1); Store.saveGroup(g); openDetail(currentGroupId); } }
function toggleTask(idx) { if (!currentGroupId) return; var groups = Store.getGroups(); var g = groups.find(function(gr){return gr.id===currentGroupId}); if (g) { g.tasks[idx].done = !g.tasks[idx].done; Store.saveGroup(g); openDetail(currentGroupId); } }
</script>
</body>
</html>

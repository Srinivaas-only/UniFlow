<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Group Projects | UniFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/theme.css"/>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111A; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(158,151,179,0.25); border-radius: 10px; }
    .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
</style>
</head>
<body class="bg-background min-h-screen text-on-surface">
<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 min-h-screen">
    <div class="p-margin-desktop space-y-gutter">
        <div class="flex justify-between items-center">
            <h2 class="font-headline-lg text-headline-lg">Group Projects</h2>
            <button onclick="openCreateModal()" class="bg-primary text-on-primary px-6 py-3 rounded-full font-bold hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">add</span> New Group
            </button>
        </div>

        <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-gutter">
            <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
                <span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">group_work</span>
                <p class="text-on-surface-variant">No groups yet. Create one to start collaborating.</p>
            </div>
        </div>
    </div>
</main>

<!-- Create Group Modal -->
<div id="create-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="bg-surface-container rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl border border-white/10">
        <h3 class="font-headline-lg-mobile text-headline-lg-mobile mb-6">Create New Group</h3>
        <input id="group-name-input" type="text" placeholder="Group name (e.g. FYP Team)" class="w-full bg-surface-container-high text-on-surface px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-primary mb-4">
        <div class="flex gap-3 justify-end">
            <button onclick="closeCreateModal()" class="px-6 py-2 rounded-full text-on-surface-variant hover:bg-white/5 transition-all">Cancel</button>
            <button onclick="createGroup()" class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold hover:scale-105 transition-all">Create</button>
        </div>
    </div>
</div>

<!-- Group Detail Modal -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="bg-surface-container rounded-2xl p-8 max-w-lg w-full mx-4 shadow-2xl border border-white/10 max-h-[80vh] overflow-y-auto custom-scrollbar">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-headline-lg-mobile text-headline-lg-mobile" id="detail-title">Group</h3>
            <button onclick="closeDetailModal()" class="text-on-surface-variant hover:text-on-surface">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Members -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-label-sm font-bold text-on-surface-variant uppercase tracking-widest">Members</h4>
                <button onclick="addMember()" class="text-primary text-label-sm hover:underline">+ Add</button>
            </div>
            <div id="detail-members" class="flex flex-wrap gap-2"></div>
        </div>
        <!-- Tasks -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-label-sm font-bold text-on-surface-variant uppercase tracking-widest">Tasks</h4>
                <button onclick="addTask()" class="text-primary text-label-sm hover:underline">+ Add</button>
            </div>
            <div id="detail-tasks" class="space-y-2"></div>
        </div>
    </div>
</div>

<div id="bottomnav-mount"></div>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/bottomNav.js"></script>
<script src="../js/store.js"></script>

<script>
var currentGroupId = null;

document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('06');
    renderHeader({ title: 'Group Projects' });
    renderBottomNav('06');
    renderGroups();
});

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderGroups() {
    var groups = Store.getGroups();
    var container = document.getElementById('groups-container');
    if (groups.length === 0) {
        container.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">group_work</span><p class="text-on-surface-variant">No groups yet. Create one to start collaborating.</p></div>';
        return;
    }
    container.innerHTML = groups.map(function(g) {
        var taskDone = g.tasks.filter(t => t.done).length;
        var taskTotal = g.tasks.length;
        var pct = taskTotal ? Math.round(taskDone / taskTotal * 100) : 0;
        return '<div class="bg-surface-container rounded-lg p-6 border border-white/5 hover:border-primary/30 transition-all cursor-pointer" onclick="openDetail(\'' + g.id + '\')">' +
            '<div class="flex justify-between items-start mb-4">' +
                '<h4 class="font-body-lg font-bold">' + escapeHtml(g.name) + '</h4>' +
                '<button onclick="event.stopPropagation(); deleteGroup(\'' + g.id + '\')" class="text-on-surface-variant hover:text-rose-400 transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>' +
            '</div>' +
            '<div class="flex items-center gap-4 mb-4">' +
                '<span class="text-label-sm text-on-surface-variant"><span class="material-symbols-outlined text-sm align-middle">person</span> ' + g.members.length + ' members</span>' +
                '<span class="text-label-sm text-on-surface-variant"><span class="material-symbols-outlined text-sm align-middle">task_alt</span> ' + taskDone + '/' + taskTotal + ' tasks</span>' +
            '</div>' +
            '<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden"><div class="h-full bg-primary rounded-full" style="width: ' + pct + '%;"></div></div>' +
            '<p class="text-[10px] text-on-surface-variant mt-2">' + pct + '% complete</p>' +
        '</div>';
    }).join('');
}

function openCreateModal() {
    document.getElementById('create-modal').classList.remove('hidden');
    document.getElementById('create-modal').classList.add('flex');
    document.getElementById('group-name-input').focus();
}
function closeCreateModal() {
    document.getElementById('create-modal').classList.add('hidden');
    document.getElementById('create-modal').classList.remove('flex');
}
function createGroup() {
    var name = document.getElementById('group-name-input').value.trim();
    if (!name) return;
    Store.createGroup(name);
    document.getElementById('group-name-input').value = '';
    closeCreateModal();
    renderGroups();
}

function deleteGroup(id) {
    if (confirm('Delete this group?')) { Store.deleteGroup(id); renderGroups(); }
}

function openDetail(id) {
    currentGroupId = id;
    var group = Store.getGroups().find(g => g.id === id);
    if (!group) return;
    document.getElementById('detail-title').textContent = group.name;
    // Members
    var membersEl = document.getElementById('detail-members');
    membersEl.innerHTML = group.members.map(function(m, i) {
        return '<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-label-sm">' +
            escapeHtml(m) +
            '<button onclick="removeMember(' + i + ')" class="ml-1 hover:text-rose-400">×</button></span>';
    }).join('');
    // Tasks
    var tasksEl = document.getElementById('detail-tasks');
    tasksEl.innerHTML = group.tasks.map(function(t, i) {
        return '<div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl">' +
            '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTask(' + i + ')" class="accent-primary cursor-pointer">' +
            '<span class="' + (t.done ? 'line-through opacity-50' : '') + ' flex-1">' + escapeHtml(t.text) + '</span>' +
            '<button onclick="removeTask(' + i + ')" class="text-on-surface-variant hover:text-rose-400"><span class="material-symbols-outlined text-sm">close</span></button>' +
        '</div>';
    }).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
    document.getElementById('detail-modal').classList.add('flex');
}
function closeDetailModal() {
    document.getElementById('detail-modal').classList.add('hidden');
    document.getElementById('detail-modal').classList.remove('flex');
    currentGroupId = null;
    renderGroups();
}

function addMember() {
    var name = prompt('Member name:');
    if (!name || !currentGroupId) return;
    var groups = Store.getGroups();
    var g = groups.find(gr => gr.id === currentGroupId);
    if (g) { g.members.push(name.trim()); Store.saveGroup(g); openDetail(currentGroupId); }
}

function removeMember(idx) {
    if (!currentGroupId) return;
    var groups = Store.getGroups();
    var g = groups.find(gr => gr.id === currentGroupId);
    if (g) { g.members.splice(idx, 1); Store.saveGroup(g); openDetail(currentGroupId); }
}

function addTask() {
    var text = prompt('Task description:');
    if (!text || !currentGroupId) return;
    var groups = Store.getGroups();
    var g = groups.find(gr => gr.id === currentGroupId);
    if (g) { g.tasks.push({ text: text.trim(), done: false }); Store.saveGroup(g); openDetail(currentGroupId); }
}

function removeTask(idx) {
    if (!currentGroupId) return;
    var groups = Store.getGroups();
    var g = groups.find(gr => gr.id === currentGroupId);
    if (g) { g.tasks.splice(idx, 1); Store.saveGroup(g); openDetail(currentGroupId); }
}

function toggleTask(idx) {
    if (!currentGroupId) return;
    var groups = Store.getGroups();
    var g = groups.find(gr => gr.id === currentGroupId);
    if (g) { g.tasks[idx].done = !g.tasks[idx].done; Store.saveGroup(g); openDetail(currentGroupId); }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>UniFlow | Log In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../theme.css" rel="stylesheet"/>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111a; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
</style>
</head>
<body>

<!-- Full-screen backdrop overlay -->
<div class="fixed inset-0 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">

    <!-- Login Modal Card -->
    <div class="w-full max-w-[400px] rounded-2xl p-8" style="background: #1a1825;">

        <!-- App Title -->
        <div class="text-center mb-8">
            <h1 class="text-[26px] font-bold" style="color: #f1eff5;">UniFlow</h1>
            <p class="text-sm mt-1" style="color: #948f99;">Log In To Continue</p>
        </div>

        <!-- Error message (hidden by default) -->
        <div id="login-error" class="hidden mb-4 p-3 rounded-lg text-sm text-center" style="background: rgba(239,68,68,0.15); color: #f87171;"></div>

        <!-- Email Input -->
        <div class="mb-4">
            <label for="login-email" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">Email</label>
            <input
                type="email"
                id="login-email"
                name="email"
                placeholder="Enter your email"
                autocomplete="off"
                class="w-full px-4 py-3 rounded-lg text-sm outline-none focus:ring-2"
                style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
            />
        </div>

        <!-- Password Input with Show/Hide -->
        <div class="mb-6">
            <label for="login-password" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">Password</label>
            <div class="relative">
                <input
                    type="password"
                    id="login-password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="off"
                    class="w-full px-4 py-3 pr-16 rounded-lg text-sm outline-none focus:ring-2"
                    style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
                />
                <button
                    type="button"
                    id="toggle-password"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-semibold bg-transparent border-none cursor-pointer"
                    style="color: #3b82f6;"
                >Show</button>
            </div>
        </div>

        <!-- Log In Button (disabled until all fields are filled) -->
        <button
            type="button"
            id="login-btn"
            disabled
            class="w-full py-3 rounded-lg text-sm font-bold border-none cursor-not-allowed transition-opacity"
            style="background: #3b82f6; color: #ffffff; opacity: 0.4;"
        >Log In</button>

        <!-- Forgot Password -->
        <div id="forgot-password-section" class="mt-4">
            <button type="button" id="forgot-password-btn" class="w-full text-xs font-semibold bg-transparent border-none cursor-pointer hover:underline" style="color: #948f99;">
                Forgot Password?
            </button>
        </div>

        <!-- Forgot Password Form (hidden by default) -->
        <div id="forgot-password-form" class="hidden mt-4">
            <div class="mb-3">
                <label for="reset-email" class="block text-xs font-semibold mb-1.5" style="color: #f1eff5;">Enter your email</label>
                <input
                    type="email"
                    id="reset-email"
                    name="reset-email"
                    placeholder="your@email.com"
                    autocomplete="email"
                    class="w-full px-4 py-3 rounded-lg text-sm outline-none focus:ring-2"
                    style="background: #12111a; color: #f1eff5; border: 1px solid #35343e; --tw-ring-color: #3b82f6;"
                />
            </div>
            <div id="reset-message" class="hidden mb-3 p-3 rounded-lg text-sm text-center"></div>
            <button
                type="button"
                id="send-reset-btn"
                class="w-full py-2.5 rounded-lg text-sm font-bold border-none cursor-pointer transition-opacity"
                style="background: #35343e; color: #f1eff5;"
            >Send Reset Link</button>
            <button
                type="button"
                id="cancel-reset-btn"
                class="w-full py-2 mt-2 text-xs font-semibold bg-transparent border-none cursor-pointer"
                style="color: #948f99;"
            >Cancel</button>
        </div>

        <!-- Footer Link -->
        <p class="text-center text-xs mt-6" style="color: #948f99;">
            New to UniFlow? <a href="./signup.html" class="font-semibold hover:underline" style="color: #3b82f6;">Create an account.</a>
        </p>

    </div>
</div>

<script>
(function() {
    var emailInput = document.getElementById('login-email');
    var passwordInput = document.getElementById('login-password');
    var toggleBtn = document.getElementById('toggle-password');
    var loginBtn = document.getElementById('login-btn');
    var errorBox = document.getElementById('login-error');

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        errorBox.classList.add('shake');
        setTimeout(function() { errorBox.classList.remove('shake'); }, 400);
    }

    function hideError() {
        errorBox.classList.add('hidden');
    }

    // Validate all fields and toggle button state
    function validateFields() {
        var allFilled = emailInput.value.trim() !== '' &&
                        passwordInput.value.trim() !== '';
        loginBtn.disabled = !allFilled;
        if (allFilled) {
            loginBtn.style.opacity = '1';
            loginBtn.style.cursor = 'pointer';
            loginBtn.classList.remove('cursor-not-allowed');
            loginBtn.classList.add('hover:opacity-90');
        } else {
            loginBtn.style.opacity = '0.4';
            loginBtn.style.cursor = 'not-allowed';
            loginBtn.classList.add('cursor-not-allowed');
            loginBtn.classList.remove('hover:opacity-90');
        }
    }

    // Listen for input changes
    emailInput.addEventListener('input', validateFields);
    passwordInput.addEventListener('input', validateFields);

    // Password show/hide toggle
    toggleBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    });

    // Enter key triggers Log In
    function onEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!loginBtn.disabled) loginBtn.click();
        }
    }
    emailInput.addEventListener('keydown', onEnter);
    passwordInput.addEventListener('keydown', onEnter);

    // Log In with Firebase Auth
    loginBtn.addEventListener('click', function() {
        if (loginBtn.disabled) return;
        hideError();

        var email = emailInput.value.trim();
        var password = passwordInput.value;

        // Show loading state
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';
        loginBtn.style.opacity = '0.7';

        firebaseAuth.signInWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                // Save display name to Store for header
                var user = userCredential.user;
                if (user.displayName) {
                    try {
                        var profile = JSON.parse(localStorage.getItem('uniflow_profile') || '{}');
                        profile.name = user.displayName;
                        localStorage.setItem('uniflow_profile', JSON.stringify(profile));
                    } catch(e) {}
                }
                // Load user data from Firestore, then redirect to dashboard
                return Store.loadFromFirestore();
            })
            .then(function() {
                window.location.href = './01.html';
            })
            .catch(function(error) {
                // Show user-friendly error
                var msg = 'Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg = 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                    case 'auth/invalid-credential':
                        msg = 'Incorrect email or password.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        msg = 'Too many attempts. Please try again later.';
                        break;
                    case 'auth/user-disabled':
                        msg = 'This account has been disabled.';
                        break;
                    default:
                        msg = error.message || 'Something went wrong. Please try again.';
                }
                showError(msg);

                // Reset button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
                loginBtn.style.opacity = '1';
            });
    });

    // ── Forgot Password ──
    var forgotBtn = document.getElementById('forgot-password-btn');
    var forgotForm = document.getElementById('forgot-password-form');
    var forgotSection = document.getElementById('forgot-password-section');
    var resetEmailInput = document.getElementById('reset-email');
    var sendResetBtn = document.getElementById('send-reset-btn');
    var cancelResetBtn = document.getElementById('cancel-reset-btn');
    var resetMessage = document.getElementById('reset-message');

    forgotBtn.addEventListener('click', function() {
        forgotSection.classList.add('hidden');
        forgotForm.classList.remove('hidden');
        // Pre-fill with login email if available
        if (emailInput.value.trim()) {
            resetEmailInput.value = emailInput.value.trim();
        }
        resetEmailInput.focus();
    });

    cancelResetBtn.addEventListener('click', function() {
        forgotForm.classList.add('hidden');
        forgotSection.classList.remove('hidden');
        resetMessage.classList.add('hidden');
    });

    sendResetBtn.addEventListener('click', function() {
        var resetEmail = resetEmailInput.value.trim();
        if (!resetEmail) {
            resetMessage.classList.remove('hidden');
            resetMessage.style.background = 'rgba(239,68,68,0.15)';
            resetMessage.style.color = '#f87171';
            resetMessage.textContent = 'Please enter your email address.';
            return;
        }

        sendResetBtn.disabled = true;
        sendResetBtn.textContent = 'Sending...';

        firebaseAuth.sendPasswordResetEmail(resetEmail)
            .then(function() {
                resetMessage.classList.remove('hidden');
                resetMessage.style.background = 'rgba(16,185,129,0.15)';
                resetMessage.style.color = '#34d399';
                resetMessage.textContent = 'Password reset email sent! Check your inbox.';
                sendResetBtn.disabled = false;
                sendResetBtn.textContent = 'Send Reset Link';
            })
            .catch(function(error) {
                var msg = 'Failed to send reset email.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg = 'No account found with this email.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        msg = 'Too many attempts. Please try again later.';
                        break;
                    default:
                        msg = error.message || 'Something went wrong.';
                }
                resetMessage.classList.remove('hidden');
                resetMessage.style.background = 'rgba(239,68,68,0.15)';
                resetMessage.style.color = '#f87171';
                resetMessage.textContent = msg;
                sendResetBtn.disabled = false;
                sendResetBtn.textContent = 'Send Reset Link';
            });
    });

    // If already logged in, load data then redirect to dashboard
    firebaseAuth.onAuthStateChanged(function(user) {
        if (user) {
            Store.loadFromFirestore().then(function() {
                window.location.href = './01.html';
            });
        }
    });
})();
</script>
</body>
</html>

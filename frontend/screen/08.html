<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholarships | UniFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/theme.css"/>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111A; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(158,151,179,0.25); border-radius: 10px; }
</style>
</head>
<body class="bg-background min-h-screen text-on-surface">
<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 min-h-screen">
    <div class="p-margin-desktop space-y-gutter">
        <!-- Profile Form -->
        <div class="bg-surface-container rounded-lg p-8">
            <div class="flex items-center gap-3 mb-6">
                <span class="material-symbols-outlined text-primary text-3xl">school</span>
                <div>
                    <h3 class="font-headline-lg text-headline-lg">Scholarship Finder</h3>
                    <p class="text-on-surface-variant text-label-sm">Enter your profile to find matching Malaysian scholarships.</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div>
                    <label class="text-label-sm text-on-surface-variant mb-1 block">CGPA</label>
                    <input id="profile-cgpa" type="number" step="0.01" min="0" max="4" placeholder="3.50" class="w-full bg-surface-container-high text-on-surface px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-primary">
                </div>
                <div>
                    <label class="text-label-sm text-on-surface-variant mb-1 block">Course</label>
                    <input id="profile-course" type="text" placeholder="Computer Science" class="w-full bg-surface-container-high text-on-surface px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-primary">
                </div>
                <div>
                    <label class="text-label-sm text-on-surface-variant mb-1 block">Year</label>
                    <select id="profile-year" class="w-full bg-surface-container-high text-on-surface px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-primary">
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3" selected>Year 3</option>
                        <option value="4">Year 4</option>
                    </select>
                </div>
                <div>
                    <label class="text-label-sm text-on-surface-variant mb-1 block">State</label>
                    <select id="profile-state" class="w-full bg-surface-container-high text-on-surface px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-primary">
                        <option value="Selangor">Selangor</option>
                        <option value="Kuala Lumpur">Kuala Lumpur</option>
                        <option value="Johor">Johor</option>
                        <option value="Penang">Penang</option>
                        <option value="Perak">Perak</option>
                        <option value="Sabah">Sabah</option>
                        <option value="Sarawak">Sarawak</option>
                        <option value="Negeri Sembilan">Negeri Sembilan</option>
                        <option value="Kedah">Kedah</option>
                        <option value="Kelantan">Kelantan</option>
                        <option value="Terengganu">Terengganu</option>
                        <option value="Pahang">Pahang</option>
                        <option value="Melaka">Melaka</option>
                        <option value="Perlis">Perlis</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="search-btn" onclick="searchScholarships()" class="w-full bg-primary text-on-primary px-6 py-3 rounded-xl font-bold hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">search</span> Find
                    </button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="results-container" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-16 text-center">
                <span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">school</span>
                <p class="text-on-surface-variant">Enter your profile and click Find to discover matching scholarships.</p>
                <p class="text-label-sm text-on-surface-variant mt-2">Powered by Bright Data SERP API</p>
            </div>
        </div>
    </div>
</main>

<div id="bottomnav-mount"></div>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/bottomNav.js"></script>
<script src="../js/store.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('08');
    renderHeader({ title: 'Scholarships' });
    renderBottomNav('08');
});

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

async function searchScholarships() {
    var cgpa = parseFloat(document.getElementById('profile-cgpa').value);
    var course = document.getElementById('profile-course').value.trim();
    var year = parseInt(document.getElementById('profile-year').value);
    var state = document.getElementById('profile-state').value;

    if (!cgpa || !course) {
        alert('Please enter your CGPA and course.');
        return;
    }

    var btn = document.getElementById('search-btn');
    var container = document.getElementById('results-container');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Searching...';
    container.innerHTML = '<div class="flex items-center justify-center py-16"><div class="flex gap-2"><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce"></span><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce" style="animation-delay:150ms"></span><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce" style="animation-delay:300ms"></span></div></div>';

    try {
        var data = await Store.searchScholarships({ cgpa: cgpa, course: course, year: year, state: state });
        var scholarships = data.scholarships || [];

        if (scholarships.length === 0) {
            container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">search_off</span><p class="text-on-surface-variant">No scholarships found. Try adjusting your profile.</p></div>';
        } else {
            container.innerHTML = '<p class="text-label-sm text-on-surface-variant mb-2">Found ' + scholarships.length + ' scholarship' + (scholarships.length !== 1 ? 's' : '') + '</p>' +
                scholarships.map(function(s) {
                    var scoreColor = s.match_score >= 80 ? 'text-emerald-400 bg-emerald-500/10' : s.match_score >= 60 ? 'text-primary bg-primary/10' : 'text-on-surface-variant bg-white/5';
                    return '<div class="bg-surface-container rounded-xl p-6 border border-white/5 hover:border-primary/20 transition-all">' +
                        '<div class="flex items-start justify-between gap-4">' +
                            '<div class="flex-1 min-w-0">' +
                                '<h4 class="font-body-lg font-bold mb-2">' + escapeHtml(s.title) + '</h4>' +
                                '<div class="flex flex-wrap gap-2 mb-3">' +
                                    (s.provider ? '<span class="px-2 py-0.5 bg-primary/10 text-primary rounded text-[10px] font-bold">' + escapeHtml(s.provider) + '</span>' : '') +
                                    (s.amount ? '<span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-400 rounded text-[10px] font-bold">' + escapeHtml(s.amount) + '</span>' : '') +
                                    (s.deadline ? '<span class="px-2 py-0.5 bg-rose-500/10 text-rose-400 rounded text-[10px] font-bold">Due: ' + escapeHtml(s.deadline) + '</span>' : '') +
                                '</div>' +
                                (s.eligibility ? '<p class="text-label-sm text-on-surface-variant mb-3">' + escapeHtml(s.eligibility) + '</p>' : '') +
                                (s.link ? '<a href="' + escapeHtml(s.link) + '" target="_blank" class="text-primary text-label-sm font-bold hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-sm">open_in_new</span> Apply / Details</a>' : '') +
                            '</div>' +
                            '<div class="flex-shrink-0 text-center">' +
                                '<span class="px-3 py-2 ' + scoreColor + ' rounded-xl text-sm font-bold">' + s.match_score + '%</span>' +
                                '<p class="text-[9px] text-on-surface-variant mt-1">match</p>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
        }
    } catch (err) {
        container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-rose-400/50 mb-4">error</span><p class="text-rose-400">' + escapeHtml(err.message) + '</p><p class="text-label-sm text-on-surface-variant mt-2">Make sure BRIGHTDATA_API_KEY is set in the backend .env</p></div>';
    }

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">search</span> Find';
}
</script>
</body>
</html>

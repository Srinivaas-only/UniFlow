<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>Assignments | UniFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111A; overflow-x: hidden; }
        .bg-glow-violet { background: radial-gradient(ellipse 80% 60% at 20% 10%,rgba(214,196,255,0.14) 0%,transparent 65%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(158,151,179,0.25); border-radius: 10px; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; opacity:0; }
    </style>
</head>
<body class="bg-background min-h-screen text-on-surface">
<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 min-h-screen">
    <div class="p-margin-desktop space-y-gutter">
        <!-- Header Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
            <div class="bg-surface-container rounded-lg p-8">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-primary">assignment</span>
                    <span class="text-label-sm text-on-surface-variant uppercase tracking-widest">Total</span>
                </div>
                <p class="text-3xl font-bold" id="stat-total">0</p>
                <p class="text-label-sm text-on-surface-variant">assignments</p>
            </div>
            <div class="bg-surface-container rounded-lg p-8">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-emerald-400">check_circle</span>
                    <span class="text-label-sm text-on-surface-variant uppercase tracking-widest">Completed</span>
                </div>
                <p class="text-3xl font-bold text-emerald-400" id="stat-completed">0</p>
                <div class="mt-3 h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-emerald-400 rounded-full transition-all" style="width: 0%;"></div>
                </div>
                <p class="text-label-sm text-on-surface-variant mt-2"><span id="stat-percent">0</span>% complete</p>
            </div>
            <div class="bg-surface-container rounded-lg p-8">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-rose-400">alarm</span>
                    <span class="text-label-sm text-on-surface-variant uppercase tracking-widest">Pending</span>
                </div>
                <p class="text-3xl font-bold text-rose-400" id="stat-pending">0</p>
                <p class="text-label-sm text-on-surface-variant">remaining</p>
            </div>
        </div>

        <!-- Assignment List -->
        <div class="bg-surface rounded-lg border border-white/5">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-headline-lg-mobile text-headline-lg-mobile">All Assignments</h3>
                <a href="09.html" class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold text-label-sm hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">add</span> Add via Chat
                </a>
            </div>
            <div id="assignment-list" class="p-6 space-y-3 custom-scrollbar max-h-[600px] overflow-y-auto">
                <div class="flex flex-col items-center justify-center py-16 text-center">
                    <span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">edit_document</span>
                    <p class="text-on-surface-variant">No assignments yet. Use the AI chat to add assignments.</p>
                    <p class="text-label-sm text-on-surface-variant mt-2">Try: <span class="text-secondary font-bold">"OS assignment due friday 5pm"</span></p>
                    <a href="09.html" class="mt-4 text-primary hover:underline font-bold">Go to AI Chat →</a>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="bottomnav-mount"></div>
<script src="../js/components/sidebar.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/bottomNav.js"></script>
<script src="../js/store.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('05');
    renderHeader({ title: 'Assignments' });
    renderBottomNav('05');
    renderAssignments();
});

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderAssignments() {
    var assignments = Store.getAssignments().sort((a, b) => a.date.localeCompare(b.date));
    var stats = Store.getAssignmentStats();
    var container = document.getElementById('assignment-list');

    document.getElementById('stat-total').textContent = stats.total;
    document.getElementById('stat-completed').textContent = stats.completed;
    document.getElementById('stat-pending').textContent = stats.total - stats.completed;
    document.getElementById('stat-percent').textContent = stats.percent;
    document.getElementById('progress-bar').style.width = stats.percent + '%';

    if (assignments.length === 0) return;

    var now = new Date().toISOString().slice(0, 10);
    container.innerHTML = assignments.map(function(a) {
        var dateObj = new Date(a.date + 'T00:00:00');
        var dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : a.date;
        var isOverdue = a.date < now && !a.completed;
        var isToday = a.date === now;
        var isWeek = !isOverdue && !isToday && new Date(a.date) < new Date(Date.now() + 7 * 86400000);

        var urgency = isOverdue ? 'border-l-rose-500 bg-rose-500/5' : isToday ? 'border-l-amber-500' : isWeek ? 'border-l-blue-500' : 'border-l-emerald-500';
        var badge = isOverdue ? '<span class="bg-rose-500/10 text-rose-400 text-[10px] font-bold px-2 py-0.5 rounded-full">OVERDUE</span>' :
                    isToday ? '<span class="bg-amber-500/10 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-full">DUE TODAY</span>' :
                    isWeek ? '<span class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-2 py-0.5 rounded-full">THIS WEEK</span>' : '';
        var completedClass = a.completed ? 'opacity-50 line-through' : '';

        return '<div class="flex items-center gap-4 p-4 rounded-xl border-l-4 ' + urgency + ' hover:bg-surface-variant/20 transition-colors">' +
            '<input type="checkbox" ' + (a.completed ? 'checked' : '') + ' onchange="toggleComplete(\'' + a.id + '\')" class="w-5 h-5 rounded accent-emerald-400 cursor-pointer flex-shrink-0">' +
            '<div class="flex-1 min-w-0 ' + completedClass + '">' +
                '<div class="flex items-center gap-3 mb-1"><h4 class="font-body-md font-bold">' + escapeHtml(a.title) + '</h4>' + badge + '</div>' +
                '<div class="flex items-center gap-3"><span class="text-[11px] text-on-surface-variant">' + dateStr + '</span>' + (a.time ? '<span class="text-[11px] text-on-surface-variant">' + a.time + '</span>' : '') + '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

function toggleComplete(id) {
    Store.toggleEventComplete(id);
    renderAssignments();
}
</script>
</body>
</html>

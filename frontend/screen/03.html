<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Resources | UniFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/theme.css"/>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #12111A; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(158,151,179,0.25); border-radius: 10px; }
</style>
</head>
<body class="bg-background min-h-screen text-on-surface">
<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 min-h-screen">
    <div class="p-margin-desktop space-y-gutter">
        <!-- Search Bar -->
        <div class="bg-surface-container rounded-lg p-8">
            <h3 class="font-headline-lg text-headline-lg mb-4">Find Study Resources</h3>
            <p class="text-on-surface-variant mb-6">Search for past papers, lecture notes, textbooks, and video tutorials for any subject.</p>
            <div class="flex gap-3">
                <input id="search-input" type="text" placeholder="e.g. Operating Systems, Calculus II, Data Structures..." class="flex-1 bg-surface-container-high text-on-surface px-5 py-3 rounded-full border border-white/10 focus:outline-none focus:border-primary">
                <button id="search-btn" onclick="searchResources()" class="bg-primary text-on-primary px-8 py-3 rounded-full font-bold hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">search</span> Search
                </button>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="flex flex-wrap gap-2" id="filter-chips">
            <button onclick="setFilter('all')" class="filter-chip px-4 py-2 rounded-full bg-primary text-on-primary text-label-sm font-bold" data-type="all">All</button>
            <button onclick="setFilter('past_paper')" class="filter-chip px-4 py-2 rounded-full bg-white/5 text-on-surface-variant text-label-sm hover:bg-white/10 transition-all" data-type="past_paper">Past Papers</button>
            <button onclick="setFilter('notes')" class="filter-chip px-4 py-2 rounded-full bg-white/5 text-on-surface-variant text-label-sm hover:bg-white/10 transition-all" data-type="notes">Notes</button>
            <button onclick="setFilter('textbook')" class="filter-chip px-4 py-2 rounded-full bg-white/5 text-on-surface-variant text-label-sm hover:bg-white/10 transition-all" data-type="textbook">Textbooks</button>
            <button onclick="setFilter('video')" class="filter-chip px-4 py-2 rounded-full bg-white/5 text-on-surface-variant text-label-sm hover:bg-white/10 transition-all" data-type="video">Videos</button>
        </div>

        <!-- Results -->
        <div id="results-container" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-16 text-center">
                <span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">folder_shared</span>
                <p class="text-on-surface-variant">Search for a subject to find study resources.</p>
                <p class="text-label-sm text-on-surface-variant mt-2">Powered by Bright Data SERP API</p>
            </div>
        </div>
    </div>
</main>

<div id="bottomnav-mount"></div>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/bottomNav.js"></script>
<script src="../js/store.js"></script>

<script>
var allResources = [];
var currentFilter = 'all';

document.addEventListener('DOMContentLoaded', function() {
    renderSidebar('03');
    renderHeader({ title: 'Resources' });
    renderBottomNav('03');
    document.getElementById('search-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchResources();
    });
});

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

var TYPE_ICONS = { past_paper: 'description', notes: 'notes', textbook: 'menu_book', video: 'play_circle', other: 'article' };
var TYPE_COLORS = { past_paper: 'text-rose-400', notes: 'text-blue-400', textbook: 'text-amber-400', video: 'text-emerald-400', other: 'text-on-surface-variant' };
var TYPE_LABELS = { past_paper: 'Past Paper', notes: 'Notes', textbook: 'Textbook', video: 'Video', other: 'Resource' };

function setFilter(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-chip').forEach(function(chip) {
        if (chip.dataset.type === type) {
            chip.className = 'filter-chip px-4 py-2 rounded-full bg-primary text-on-primary text-label-sm font-bold';
        } else {
            chip.className = 'filter-chip px-4 py-2 rounded-full bg-white/5 text-on-surface-variant text-label-sm hover:bg-white/10 transition-all';
        }
    });
    renderResults();
}

function renderResults() {
    var container = document.getElementById('results-container');
    var filtered = currentFilter === 'all' ? allResources : allResources.filter(r => r.type === currentFilter);

    if (filtered.length === 0) {
        container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">search_off</span><p class="text-on-surface-variant">No resources found. Try a different search or filter.</p></div>';
        return;
    }

    container.innerHTML = filtered.map(function(r) {
        var icon = TYPE_ICONS[r.type] || TYPE_ICONS.other;
        var color = TYPE_COLORS[r.type] || TYPE_COLORS.other;
        var label = TYPE_LABELS[r.type] || TYPE_LABELS.other;
        return '<a href="' + escapeHtml(r.link) + '" target="_blank" class="block bg-surface-container rounded-xl p-5 border border-white/5 hover:border-primary/30 transition-all hover:bg-surface-variant/20">' +
            '<div class="flex items-start gap-4">' +
                '<div class="p-2 bg-white/5 rounded-xl flex-shrink-0"><span class="material-symbols-outlined ' + color + '">' + icon + '</span></div>' +
                '<div class="flex-1 min-w-0">' +
                    '<h4 class="font-body-md font-bold mb-1">' + escapeHtml(r.title) + '</h4>' +
                    (r.description ? '<p class="text-label-sm text-on-surface-variant line-clamp-2 mb-2">' + escapeHtml(r.description) + '</p>' : '') +
                    '<div class="flex items-center gap-3">' +
                        '<span class="px-2 py-0.5 bg-white/5 ' + color + ' rounded text-[10px] font-bold uppercase">' + label + '</span>' +
                        '<span class="text-[10px] text-on-surface-variant">' + escapeHtml(r.source) + '</span>' +
                    '</div>' +
                '</div>' +
                '<span class="material-symbols-outlined text-on-surface-variant flex-shrink-0">open_in_new</span>' +
            '</div>' +
        '</a>';
    }).join('');
}

async function searchResources() {
    var subject = document.getElementById('search-input').value.trim();
    if (!subject) return;

    var btn = document.getElementById('search-btn');
    var container = document.getElementById('results-container');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Searching...';
    container.innerHTML = '<div class="flex items-center justify-center py-16"><div class="flex gap-2"><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce"></span><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce" style="animation-delay:150ms"></span><span class="w-3 h-3 bg-primary/60 rounded-full animate-bounce" style="animation-delay:300ms"></span></div></div>';

    try {
        var data = await Store.searchResources(subject);
        allResources = data.resources || [];
        currentFilter = 'all';
        setFilter('all');
        renderResults();
        if (allResources.length === 0) {
            container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-on-surface-variant/30 mb-4">search_off</span><p class="text-on-surface-variant">No resources found for "' + escapeHtml(subject) + '". Try a different subject.</p></div>';
        }
    } catch (err) {
        container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center"><span class="material-symbols-outlined text-[48px] text-rose-400/50 mb-4">error</span><p class="text-rose-400">' + escapeHtml(err.message) + '</p><p class="text-label-sm text-on-surface-variant mt-2">Make sure BRIGHTDATA_API_KEY is set in the backend .env</p></div>';
    }

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">search</span> Search';
}
</script>
</body>
</html>

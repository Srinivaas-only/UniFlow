<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
<title>UniFlow | Resources</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../js/components/tailwind.js"></script>
<script>initTailwind();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#12111A}
    .bg-glow-violet{background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(214,196,255,0.14) 0%,transparent 65%)}
    .bg-glow-rose{background:radial-gradient(ellipse 70% 50% at 85% 75%,rgba(255,194,220,0.08) 0%,transparent 60%)}
    .custom-scrollbar::-webkit-scrollbar{width:4px}
    .custom-scrollbar::-webkit-scrollbar-track{background:transparent}
    .custom-scrollbar::-webkit-scrollbar-thumb{background:rgba(158,151,179,0.25);border-radius:10px}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .fade-in-up{animation:fadeInUp 0.4s ease-out forwards;opacity:0}
</style>
</head>
<body class="bg-background text-on-surface">
<div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[70%] h-[70%] bg-glow-violet"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[65%] h-[65%] bg-glow-rose"></div>
</div>
<div id="sidebar-mount"></div>
<div id="header-mount"></div>

<main class="md:ml-[280px] pt-20 h-screen overflow-y-auto custom-scrollbar">
    <div id="auth-loading"></div>
    <div id="page-content" class="px-margin-mobile md:px-margin-desktop pr-4 pb-24 space-y-6 max-w-6xl">

        <!-- Header + Refresh -->
        <div class="bg-surface-container/60 rounded-3xl p-6 border border-outline-variant/10 fade-in-up" style="animation-delay:0ms">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-headline-sm font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined">library_books</span> Study Resources
                </h2>
                <div class="flex items-center gap-3">
                    <span id="total-count" class="text-label-sm text-on-surface-variant"></span>
                    <button onclick="refreshResources()" class="p-2 rounded-xl hover:bg-primary/10 text-on-surface-variant hover:text-primary transition-all" title="Refresh">
                        <span class="material-symbols-outlined text-lg">refresh</span>
                    </button>
                </div>
            </div>
            <p class="text-on-surface-variant text-body-md mb-2">Course materials imported from Spectrum via the UniFlow Chrome Extension.</p>
        </div>

        <!-- Course Groups Container -->
        <div id="course-groups" class="space-y-4"></div>

        <!-- Empty State -->
        <div id="empty-state" class="flex flex-col items-center justify-center py-16 text-center">
            <div class="w-14 h-14 rounded-3xl bg-surface-container-high flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-on-surface-variant text-3xl">cloud_download</span>
            </div>
            <h3 class="text-headline-sm text-on-surface-variant mb-2">No resources yet</h3>
            <p class="text-on-surface-variant text-body-md max-w-md mb-6">Open the UniFlow Chrome Extension on a Spectrum course page to import notes, quizzes, and study materials.</p>
            <a href="https://github.com/Srinivaas-only/UniFlow/tree/main/extension" target="_blank" class="px-5 py-2.5 bg-primary/10 text-primary rounded-2xl text-label-sm font-bold hover:bg-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">extension</span> Download Extension
            </a>
        </div>
    </div>
</main>

<script src="../js/components/sidebar.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/components/header.js"></script>
<script src="../js/components/modal.js"></script>
<script src="../js/store.js"></script>
<script src="../js/components/notifications.js"></script>
<script src="../js/components/toast.js"></script>
<script src="../js/components/authGuard.js"></script>
<script>
function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}

// File type display config — ordered by importance
var FILE_TYPE_ORDER = ['pdf','pptx','docx','xlsx','video','audio','link','folder','page','archive','quiz','other'];
var FILE_TYPE_CONFIG = {
    pdf:     {emoji:'📄', label:'PDF',          color:'text-red-400',     bg:'bg-red-500/15'},
    pptx:    {emoji:'📊', label:'Slides',        color:'text-orange-400',  bg:'bg-orange-500/15'},
    docx:    {emoji:'📝', label:'Documents',     color:'text-blue-400',    bg:'bg-blue-500/15'},
    xlsx:    {emoji:'📈', label:'Spreadsheets',  color:'text-emerald-400', bg:'bg-emerald-500/15'},
    video:   {emoji:'🎬', label:'Videos',        color:'text-purple-400',  bg:'bg-purple-500/15'},
    audio:   {emoji:'🎵', label:'Audio',         color:'text-pink-400',    bg:'bg-pink-500/15'},
    link:    {emoji:'🔗', label:'Links',         color:'text-cyan-400',    bg:'bg-cyan-500/15'},
    folder:  {emoji:'📁', label:'Folders',       color:'text-amber-400',   bg:'bg-amber-500/15'},
    page:    {emoji:'📃', label:'Pages',         color:'text-teal-400',    bg:'bg-teal-500/15'},
    archive: {emoji:'🗜️', label:'Archives',      color:'text-gray-400',    bg:'bg-gray-500/15'},
    quiz:    {emoji:'❓', label:'Quizzes',       color:'text-amber-400',   bg:'bg-amber-500/15'},
    other:   {emoji:'📄', label:'Other',         color:'text-gray-400',    bg:'bg-gray-500/15'}
};

function getFileType(item) {
    // Prefer file_type set by extension, fall back to modtype-based classification
    if (item.file_type && item.file_type !== 'other') return item.file_type;
    // Use original Moodle modtype (passed from backend) for structural classification
    // Backend sets type="resource" for ALL resources, so check modtype first
    var modtype = (item.modtype || item.type || '').toLowerCase();
    if (modtype === 'quiz') return 'quiz';
    if (modtype === 'url') return 'link';
    if (modtype === 'folder') return 'folder';
    if (modtype === 'book' || modtype === 'page') return 'page';
    // Try to guess from title
    var title = (item.title || '').toLowerCase();
    if (/\.pdf\b/.test(title)) return 'pdf';
    if (/\.pptx?\b/.test(title)) return 'pptx';
    if (/\.docx?\b/.test(title)) return 'docx';
    if (/\.xlsx?\b/.test(title)) return 'xlsx';
    return 'other';
}

document.addEventListener('DOMContentLoaded',function(){
    renderSidebar('03');renderHeader({title:'Resources',subtitle:'Spectrum Import'});
    initAuthGuard({onAuthenticated:function(){
        // Bridge now merges directly into Store — just render
        var syncData=Store._get('spectrumSync');
        if(syncData&&syncData.resources&&syncData.resources.length>0){
            Store.addSpectrumResources(syncData.resources);
        }
        renderResources();
    }});
    // Listen for bridge data from the Chrome extension web_bridge.js
    window.addEventListener('uniflow:spectrum-data-ready',function(){
        var syncData=Store._get('spectrumSync');
        if(syncData&&syncData.resources&&syncData.resources.length>0){
            Store.addSpectrumResources(syncData.resources);
        }
        renderResources();
    });
});

function refreshResources(){
    renderResources();
    if(typeof Toast!=='undefined') Toast.show('Resources refreshed','success');
}

function renderResources(){
    var resources=Store.getSpectrumResources();
    var container=document.getElementById('course-groups');
    var emptyState=document.getElementById('empty-state');
    var totalCount=document.getElementById('total-count');

    if(!resources||resources.length===0){
        container.innerHTML='';
        emptyState.style.display='flex';
        totalCount.textContent='';
        return;
    }

    emptyState.style.display='none';
    totalCount.textContent=resources.length+' resource'+(resources.length!==1?'s':'');

    // Group by course (use course_code, fall back to course_name, then "Unknown Course")
    var byCourse={};
    resources.forEach(function(r){
        var code=r.course_code||'';
        var name=r.course_name||'';
        var key=code||name||'Unknown Course';
        if(!byCourse[key]) byCourse[key]={code:code,name:name||key,items:[]};
        byCourse[key].items.push(r);
    });
    var courseKeys=Object.keys(byCourse).sort();

    var html='';
    courseKeys.forEach(function(courseKey,cIdx){
        var course=byCourse[courseKey];

        // Sub-group items by file type
        var byType={};
        course.items.forEach(function(item){
            var ft=getFileType(item);
            if(!byType[ft]) byType[ft]=[];
            byType[ft].push(item);
        });

        // Course card header
        html+=
        '<div class="fade-in-up bg-surface-container/60 rounded-3xl border border-outline-variant/10 overflow-hidden" style="animation-delay:'+cIdx*60+'ms">'+
            '<div class="p-5 border-b border-outline-variant/10">'+
                '<div class="flex items-center gap-3">'+
                    '<div class="w-10 h-10 rounded-xl bg-primary/15 flex items-center justify-center flex-shrink-0">'+
                        '<span class="material-symbols-outlined text-primary">school</span>'+
                    '</div>'+
                    '<div class="flex-1 min-w-0">'+
                        (course.code?'<h3 class="text-label-sm font-bold text-on-surface">'+escapeHtml(course.code)+'</h3>':'')+
                        '<p class="text-[11px] text-on-surface-variant'+(course.code?'':' font-bold')+'">'+escapeHtml(course.name)+'</p>'+
                    '</div>'+
                    '<span class="text-[10px] text-on-surface-variant bg-surface-container-high px-2.5 py-1 rounded-full font-bold">'+course.items.length+' items</span>'+
                '</div>'+
            '</div>';

        // Render each file type sub-group (only types that have items)
        FILE_TYPE_ORDER.forEach(function(ft){
            if(!byType[ft]||byType[ft].length===0) return;
            var cfg=FILE_TYPE_CONFIG[ft]||FILE_TYPE_CONFIG.other;
            var items=byType[ft];

            html+=
            '<div class="px-5 pt-4 pb-1">'+
                '<div class="flex items-center gap-2 mb-3">'+
                    '<span class="text-label-sm font-bold text-on-surface-variant">'+cfg.emoji+' '+cfg.label+'</span>'+
                    '<span class="text-[10px] text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded-full">'+items.length+'</span>'+
                '</div>'+
                '<div class="space-y-2">';

            items.forEach(function(item){
                var sectionLabel=item.section||item.section_name?'<span class="text-[10px] text-on-surface-variant">'+escapeHtml(item.section||item.section_name)+'</span>':'';
                var importedDate='';
                if(item.imported_at||item.createdAt){
                    try{
                        var dt=new Date(item.imported_at||item.createdAt);
                        if(!isNaN(dt))importedDate='<span class="text-[10px] text-on-surface-variant">'+dt.toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})+'</span>';
                    }catch(e){}
                }
                var openUrl=item.url||item.source_url||'';

                html+=
                '<div class="flex items-center gap-3 p-3 bg-surface-container/40 rounded-2xl hover:bg-surface-container/60 transition-all">'+
                    '<div class="p-2 '+cfg.bg+' rounded-xl flex-shrink-0"><span class="text-[14px]">'+cfg.emoji+'</span></div>'+
                    '<div class="flex-1 min-w-0">'+
                        '<p class="text-label-sm font-bold truncate">'+escapeHtml(item.title||'Untitled')+'</p>'+
                        '<div class="flex items-center gap-2 mt-0.5">'+
                            sectionLabel+
                            (sectionLabel&&importedDate?'<span class="text-on-surface-variant opacity-30">·</span>':'')+
                            importedDate+
                        '</div>'+
                    '</div>'+
                    (openUrl?'<a href="'+escapeHtml(openUrl)+'" target="_blank" class="p-2 rounded-xl hover:bg-primary/10 text-on-surface-variant hover:text-primary transition-all" title="Open in Spectrum"><span class="material-symbols-outlined text-lg">open_in_new</span></a>':'')+
                '</div>';
            });

            html+='</div></div>';
        });

        html+='</div>';
    });

    container.innerHTML=html;
}
</script>
</body>
</html>
